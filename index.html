<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>ZEII OS - Turbo TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; overflow: hidden; }
        body { background: #000; font-family: sans-serif; cursor: none; color: white; }
        #tv-screen { position: relative; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; }
        
        /* Input Nomor Atas Kiri - INSTAN */
        #input-display {
            position: absolute; top: 20px; left: 20px; font-size: 8rem;
            color: #00fbff; font-weight: bold; text-shadow: 5px 5px 20px #000;
            z-index: 100; font-family: 'Courier New', monospace;
        }

        /* OSD Banner - Muncul tanpa nunggu video */
        #osd { 
            position: absolute; bottom: 8%; left: 5%; 
            background: rgba(0, 0, 0, 0.8); padding: 15px 40px; 
            border-left: 12px solid #00fbff; opacity: 0; transition: 0.2s; z-index: 10;
        }
        #osd.active { opacity: 1; }

        #no-signal { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #00008b; display: none; align-items: center; justify-content: center; z-index: 5;
        }
    </style>
</head>
<body onclick="initTV()">

    <div id="tv-screen">
        <div id="input-display"></div>
        <div id="no-signal"><h1 style="border:4px solid white; padding:20px;">TIDAK ADA SINYAL</h1></div>
        <video id="video-player" playsinline autoplay></video>
        <div id="osd">
            <h1 id="osd-num">01</h1>
            <div id="osd-name" style="font-size: 2.5rem; font-weight: bold;">MEMUAT...</div>
            <div style="color: #00fbff;">DTV DIGITAL - LOW LATENCY</div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video-player');
        const osd = document.getElementById('osd');
        const noSignal = document.getElementById('no-signal');
        const inputDisplay = document.getElementById('input-display');
        
        let channels = [];
        let currentIndex = 0;
        let numBuffer = "";
        let hls = new Hls({
            maxBufferLength: 10,        // Perkecil buffer biar cepet
            maxMaxBufferLength: 20,
            enableWorker: true,
            lowLatencyMode: true        // Mode anti-lelet
        });

        // Load data langsung (tanpa proxy untuk listnya dulu biar cepet)
        fetch("https://iptv-org.github.io/iptv/languages/ind.m3u")
            .then(res => res.text())
            .then(data => {
                const lines = data.split('\n');
                let id = 1;
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF')) {
                        const name = lines[i].split(',')[1].trim();
                        const url = lines[i+1]?.trim();
                        if(url) channels.push({ id: id++, name, url });
                    }
                }
                playChannel(0);
            }).catch(() => {
                // Jika gagal, baru pakai proxy
                location.reload(); 
            });

        function playChannel(index) {
            if (index < 0) index = channels.length - 1;
            if (index >= channels.length) index = 0;
            currentIndex = index;
            
            const ch = channels[index];
            
            // UI Update INSTAN (Nggak nunggu video)
            noSignal.style.display = 'none';
            document.getElementById('osd-num').innerText = ch.id.toString().padStart(2, '0');
            document.getElementById('osd-name').innerText = ch.name;
            osd.classList.add('active');
            
            clearTimeout(window.osdTimer);
            window.osdTimer = setTimeout(() => osd.classList.remove('active'), 3000);

            // Engine Play - Turbo Load
            hls.destroy();
            hls = new Hls({ maxBufferLength: 5, enableWorker: true });
            
            // Coba Bypass Proxy kalau linknya bermasalah
            const finalUrl = ch.url.includes('google') ? ch.url : ch.url; 
            
            hls.loadSource(finalUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play().catch(e => console.log("Auto-play blocked"));
            });

            // Deteksi Gagal Cepat (5 detik nggak muncul = No Signal)
            clearTimeout(window.sigTimer);
            window.sigTimer = setTimeout(() => {
                if (video.paused || video.readyState < 2) noSignal.style.display = 'flex';
            }, 8000);
        }

        window.addEventListener('keydown', (e) => {
            const code = e.keyCode;
            const key = e.key;

            if (key === "ArrowUp" || code === 427 || code === 33) playChannel(currentIndex + 1);
            if (key === "ArrowDown" || code === 428 || code === 34) playChannel(currentIndex - 1);

            if (/[0-9]/.test(key)) {
                numBuffer += key;
                inputDisplay.innerText = numBuffer;
                clearTimeout(window.numTimer);
                window.numTimer = setTimeout(() => {
                    const target = parseInt(numBuffer) - 1;
                    if (channels[target]) playChannel(target);
                    numBuffer = "";
                    inputDisplay.innerText = "";
                }, 800); // Dipercepat dari 1.2s ke 0.8s
            }
        });

        function initTV() {
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            video.play();
        }
    </script>
</body>
</html>
