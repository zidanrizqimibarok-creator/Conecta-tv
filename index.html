<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONECTA T.O V6 - AI SUBTITLE</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; cursor: none; color: #fff; font-family: 'Arial Black', sans-serif; }
        #booting { position: absolute; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .boot-text { font-size: 3rem; letter-spacing: 15px; animation: flash 1.5s infinite; }
        #yt-wrapper { width: 100%; height: 100%; }
        iframe { width: 100%; height: 100%; border: none; }
        #dash {
            position: absolute; bottom: 5%; left: 3%; right: 3%;
            background: rgba(0,0,0,0.9); border-left: 12px solid #ff0000;
            padding: 20px 40px; transform: translateY(200%); transition: 0.5s;
            z-index: 500; backdrop-filter: blur(8px);
        }
        #dash.show { transform: translateY(0); }
        .ch-name { font-size: 3.5rem; margin: 0; text-transform: uppercase; }
        .tag { padding: 5px 12px; font-size: 0.8rem; border-radius: 4px; margin-right: 5px; font-weight: bold; }
        .t-live { background: #ff0000; }
        .t-sub { background: #28a745; animation: blink 1s infinite; }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div id="booting"><div class="boot-text">CONECTA T.O</div></div>

<div id="yt-wrapper">
    <iframe id="tv-frame" allow="autoplay; fullscreen" title="YouTube video player"></iframe>
</div>

<div id="dash">
    <div style="margin-bottom: 5px;">
        <span class="tag t-live">● LIVE</span>
        <span id="ch-loc" class="tag" style="background:#0056b3">INDONESIA</span>
        <span class="tag t-sub">AI AUTO-SUBTITLE ACTIVE</span>
    </div>
    <h1 class="ch-name" id="ch-title">LOADING...</h1>
    <p id="ch-desc" style="color: #aaa; margin: 5px 0 0 0;">Bahasa: Indonesia</p>
</div>

<script>
    const channels = [
        { name: "Upin Ipin Live", id: "live_stream?channel=UCp0C_O9vV3-O3_Vn2p8mC9g", loc: "MALAYSIA", lang: "Melayu" },
        { name: "Disney Kids", id: "P2v6i_L_S_0", loc: "USA", lang: "English" },
        { name: "Marvel TV", id: "rS8_6t6SIsE", loc: "USA", lang: "English" },
        { name: "Boomerang TV", id: "65IsA_SshL4", loc: "USA", lang: "English" },
        { name: "Disney Channel", id: "w7pYhp496tg", loc: "USA", lang: "English" },
        { name: "TVRI World", id: "eE5E8MXQpqc", loc: "GLOBAL", lang: "English" },
        { name: "TVRI Sport", id: "6a23sxk5_vM", loc: "INDONESIA", lang: "Indonesia" },
        { name: "Kompas TV", id: "2MC5ltEDu7w", loc: "INDONESIA", lang: "Indonesia" },
        { name: "CNN Indonesia", id: "YbQwgoMoztA", loc: "INDONESIA", lang: "Indonesia" },
        { name: "Al Jazeera", id: "_HviSyC7zSU", loc: "QATAR", lang: "English" }
    ];

    let current = 0;
    const frame = document.getElementById('tv-frame');
    const dash = document.getElementById('dash');

    function play(idx) {
        const c = channels[idx];
        document.getElementById('ch-title').innerText = c.name;
        document.getElementById('ch-loc').innerText = c.loc;
        document.getElementById('ch-desc').innerText = `Bahasa: ${c.lang}`;
        
        // Parameter Penting untuk Subtitle:
        // cc_load_policy=1 : Menampilkan subtitle secara paksa
        // cc_lang_pref=id : Memilih bahasa Indonesia
        // hl=id : Mengatur bahasa antarmuka ke Indonesia (agar AI YouTube menerjemahkan ke Indo)
        const videoSource = `https://www.youtube.com/embed/${c.id}?autoplay=1&controls=0&cc_load_policy=1&cc_lang_pref=id&hl=id&vq=hd720`;
        
        frame.src = videoSource;

        dash.classList.add('show');
        setTimeout(() => dash.classList.remove('show'), 5000);
    }

    window.onload = () => {
        setTimeout(() => {
            document.getElementById('booting').style.display = "none";
            play(current);
        }, 3000);
    };

    window.addEventListener('keydown', (e) => {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});

        if (e.key === "ArrowUp" || e.key === "ChannelUp" || e.keyCode === 427) {
            current = (current + 1) % channels.length;
            play(current);
        } else if (e.key === "ArrowDown" || e.key === "ChannelDown" || e.keyCode === 428) {
            current = (current - 1 + channels.length) % channels.length;
            play(current);
        }
    });
</script>
</body>
</html>
