
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONECTA TV - PURE STREAM</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; cursor: none; color: #fff; }
        #tv-container { width: 100vw; height: 100vh; position: relative; }
        .video-js { width: 100% !important; height: 100% !important; }

        /* Animasi Tanda Seru (!) */
        #error-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .bang-icon { font-size: 15rem; color: #ff0000; animation: bounce 0.6s infinite alternate; text-shadow: 0 0 30px #f00; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.2); } }

        /* Info Channel */
        #ch-info {
            position: absolute; bottom: 8%; left: 5%;
            background: rgba(0,0,0,0.9); padding: 15px 40px; border-left: 10px solid #f00;
            opacity: 0; transition: 0.4s; z-index: 110;
        }
        #ch-info.show { opacity: 1; }
        #ch-info h1 { margin: 0; font-size: 3.5rem; color: #fff; text-transform: uppercase; }

        .conecta-logo { position: absolute; bottom: 18%; left: 25px; color: rgba(255,255,255,0.1); font-weight: bold; letter-spacing: 5px; z-index: 50; }
    </style>
</head>
<body>

<div id="tv-container">
    <div class="conecta-logo">CONECTA</div>

    <div id="error-screen">
        <div class="bang-icon">!</div>
        <h1 style="color: #f00;">KONEKSI TERPUTUS!</h1>
    </div>

    <iframe id="yt-player" style="width:100%; height:100%; border:none; display:none; position:absolute;"></iframe>
    
    <video id="vjs-player" class="video-js vjs-big-play-centered" style="display:none; position:absolute;"></video>

    <div id="ch-info">
        <p id="ch-num" style="margin:0; color:#f00; font-weight:bold;">CHANNEL 01</p>
        <h1 id="ch-name">LOADING...</h1>
    </div>
</div>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
<script>
    // Link m3u8 ini diambil dari server distribusi agar tidak muncul web/chat/iklan web
    const playlist = [
        { name: "iNews TV", type: "yt", url: "Kz3FK5FbBz8" },
        { name: "Metro TV", type: "yt", url: "AUE5iHINUIw" },
        { name: "RTV", type: "hls", url: "https://rtv-live.akamaized.net/hls/live/2043517/rtv/master.m3u8" },
        { name: "TRANS 7", type: "hls", url: "https://trans7-live.akamaized.net/hls/live/2034360/trans7/master.m3u8" },
        { name: "TRANS TV", type: "hls", url: "https://transtv-live.akamaized.net/hls/live/2034359/transtv/master.m3u8" },
        { name: "RCTI", type: "hls", url: "https://vcl.rctiplus.id/hls/rcti/v1/master.m3u8" }
    ];

    let currentIdx = 0;
    const vjs = videojs('vjs-player', { autoplay: true, controls: false });
    const yt = document.getElementById('yt-player');
    const vjsEl = document.getElementById('vjs-player');
    const info = document.getElementById('ch-info');
    const errorSc = document.getElementById('error-screen');

    function play(idx) {
        errorSc.style.display = "none";
        const ch = playlist[idx];
        
        document.getElementById('ch-num').innerText = `CHANNEL ${(idx+1).toString().padStart(2, '0')}`;
        document.getElementById('ch-name').innerText = ch.name;
        info.classList.add('show');
        setTimeout(() => info.classList.remove('show'), 4000);

        if (ch.type === "yt") {
            vjsEl.style.display = "none";
            yt.style.display = "block";
            yt.src = `https://www.youtube.com/embed/${ch.url}?autoplay=1&controls=0&rel=0&showinfo=0`;
            vjs.pause();
        } else {
            yt.style.display = "none";
            yt.src = "";
            vjsEl.style.display = "block";
            vjs.src({ type: 'application/x-mpegURL', src: ch.url });
            vjs.play().catch(() => errorSc.style.display = "flex");
        }
    }

    window.addEventListener('keydown', (e) => {
        // Paksa Fullscreen saat ganti channel
        if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});

        // Deteksi Tombol PR/CH dari remotemu
        if (e.key === "ChannelUp" || e.key === "ArrowUp" || e.keyCode === 427) {
            currentIdx = (currentIdx + 1) % playlist.length;
            play(currentIdx);
        } else if (e.key === "ChannelDown" || e.key === "ArrowDown" || e.keyCode === 428) {
            currentIdx = (currentIdx - 1 + playlist.length) % playlist.length;
            play(currentIdx);
        }
    });

    vjs.on('error', () => errorSc.style.display = "flex");
    play(currentIdx);
</script>
</body>
</html>
