<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONECTA TV T.O</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; cursor: none; color: #fff; font-family: 'Arial Black', sans-serif; }
        
        /* Layar Booting */
        #booting-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 200; display: flex; align-items: center; justify-content: center;
        }
        .booting-text { font-size: 3rem; letter-spacing: 10px; animation: pulse 1.5s infinite; color: #fff; }

        /* Layar Error (!) */
        #error-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 150; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .bang-icon { font-size: 15rem; color: #f00; animation: bounce 0.5s infinite alternate; }

        /* Frame Player */
        iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; display: none; }
        .active { display: block !important; }

        /* Overlay Info */
        #info-bar {
            position: absolute; bottom: 8%; left: 5%;
            background: rgba(0,0,0,0.9); padding: 15px 50px; border-left: 10px solid #f00;
            opacity: 0; transition: 0.4s; z-index: 100;
        }
        #info-bar.show { opacity: 1; }
        .conecta-logo { position: absolute; bottom: 18%; left: 30px; color: rgba(255,255,255,0.1); font-weight: bold; z-index: 50; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.2); } }
    </style>
</head>
<body>

<div id="booting-screen"><div class="booting-text">CONECTA T.O</div></div>

<div id="error-screen">
    <div class="bang-icon">!</div>
    <h1 style="color:#f00">SINYAL HILANG</h1>
</div>

<div class="conecta-logo">CONECTA</div>

<iframe id="tv-frame" allow="autoplay; fullscreen"></iframe>

<div id="info-bar">
    <p id="ch-num" style="margin:0; color:#f00; font-weight:bold;">CH 01</p>
    <h1 id="ch-name" style="margin:0; font-size:3rem; color:#fff;">LOADING...</h1>
</div>

<script>
    const channels = [
        { name: "iNews TV", type: "yt", id: "Kz3FK5FbBz8" },
        { name: "Metro TV", type: "yt", id: "AUE5iHINUIw" },
        { name: "TVRI Nasional", type: "yt", id: "sAFSy3ys-ns" },
        { name: "TVRI World", type: "yt", id: "eE5E8MXQpqc" },
        { name: "TVRI Sport", type: "yt", id: "6a23sxk5_vM" },
        { name: "Upin Ipin (LIVE)", type: "lescopaque", id: "LesCopaque" },
        { name: "RTV", type: "web", url: "https://www.rtv.co.id/livertv.php" },
        { name: "TRANS 7", type: "web", url: "https://www.transtv.co.id/live/trans7" }
    ];

    let currentIdx = 0;
    const frame = document.getElementById('tv-frame');
    const boot = document.getElementById('booting-screen');
    const err = document.getElementById('error-screen');
    const info = document.getElementById('info-bar');

    async function changeCH(idx) {
        // Efek Booting
        boot.style.display = "flex";
        err.style.display = "none";
        frame.classList.remove('active');
        
        const ch = channels[idx];
        document.getElementById('ch-num').innerText = `CH ${(idx+1).toString().padStart(2, '0')}`;
        document.getElementById('ch-name').innerText = ch.name;

        let finalUrl = "";

        if (ch.type === "yt") {
            finalUrl = `https://www.youtube.com/embed/${ch.id}?autoplay=1&controls=0&rel=0`;
        } else if (ch.type === "lescopaque") {
            // Logika Smart Search untuk Les' Copaque
            finalUrl = `https://www.youtube.com/embed/live_stream?channel=UCp0C_O9vV3-O3_Vn2p8mC9g&autoplay=1&controls=0`;
        } else {
            finalUrl = ch.url;
        }

        frame.src = finalUrl;

        // Selesaikan Booting setelah 2 detik
        setTimeout(() => {
            boot.style.display = "none";
            frame.classList.add('active');
            info.classList.add('show');
            setTimeout(() => info.classList.remove('show'), 4000);
        }, 2000);
    }

    window.addEventListener('keydown', (e) => {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();

        if (e.key === "ArrowUp" || e.key === "ChannelUp" || e.keyCode === 427) {
            currentIdx = (currentIdx + 1) % channels.length;
            changeCH(currentIdx);
        } else if (e.key === "ArrowDown" || e.key === "ChannelDown" || e.keyCode === 428) {
            currentIdx = (currentIdx - 1 + channels.length) % channels.length;
            changeCH(currentIdx);
        }
    });

    // Jalankan pertama kali
    changeCH(currentIdx);
</script>
</body>
</html>
