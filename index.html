<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>CONECTA T.O - HYBRID TV</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; color: #fff; font-family: 'Arial Black', sans-serif; cursor: none; }
        #tv-screen { width: 100vw; height: 100vh; position: relative; display: flex; align-items: center; justify-content: center; }
        iframe { width: 100%; height: 100%; border: none; position: absolute; }

        /* Efek Semut Analog */
        #noise {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/5/5a/Static_noise.gif');
            background-size: cover; z-index: 900; display: none; opacity: 0.8;
        }

        /* Overlay Status */
        #status-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 1000; display: none; 
            flex-direction: column; align-items: center; justify-content: center; 
        }
        .bang { font-size: 15rem; color: #f00; animation: bounce 0.5s infinite alternate; }

        /* Kotak Nama Channel */
        #info-bar {
            position: absolute; bottom: 8%; left: 5%;
            background: rgba(0,0,0,0.9); padding: 15px 40px; border-left: 10px solid #f00;
            opacity: 0; transition: 0.5s; z-index: 1100;
        }
        #info-bar.show { opacity: 1; }
        .ch-type { color: #ff0; font-size: 0.9rem; letter-spacing: 2px; }

        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }
    </style>
</head>
<body>

<div id="tv-screen">
    <div id="noise"></div>
    <div id="status-overlay">
        <div id="error-content" style="text-align:center;">
            <div class="bang" id="icon-status">!</div>
            <h1 id="text-status" style="color:#f00; margin-top:20px;">NO SIGNAL</h1>
        </div>
    </div>

    <iframe id="main-player" allow="autoplay; fullscreen"></iframe>

    <div id="info-bar">
        <div class="ch-type" id="display-type">DIGITAL TV</div>
        <h1 id="display-name" style="margin:0; font-size:3rem; text-transform:uppercase;">OFFLINE</h1>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = {
        apiKey: "AIzaSyBoS3INezO0UQptcXYNZFbnPbmmf_hU8xc",
        authDomain: "xbook-global26.firebaseapp.com",
        databaseURL: "https://xbook-global26-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "xbook-global26",
        appId: "1:384795261277:web:6a2b05dbea819b4f4590b4"
    };

    const db = getDatabase(initializeApp(config));
    const frame = document.getElementById('main-player');
    const noise = document.getElementById('noise');
    const overlay = document.getElementById('status-overlay');
    const info = document.getElementById('info-bar');

    let currentList = [];
    let currentIdx = 0;

    onValue(ref(db, 'conecta_tv'), (snap) => {
        const data = snap.val();
        if(!data) return;

        currentList = data.channels || [];
        currentIdx = data.current_idx || 0;
        const ch = currentList[currentIdx];
        const isGlobalOff = data.global_analog_off && ch?.type === 'analog';

        if (data.power === "OFF" || isGlobalOff) {
            frame.src = "";
            overlay.style.display = "flex";
            if (ch?.type === 'analog') {
                noise.style.display = "block";
                document.getElementById('icon-status').style.display = "none";
                document.getElementById('text-status').innerText = "ANALOG NOT SUPPORT CONECT TV";
            } else {
                noise.style.display = "none";
                document.getElementById('icon-status').style.display = "block";
                document.getElementById('text-status').innerText = "NO SIGNAL";
            }
        } else {
            overlay.style.display = "none";
            noise.style.display = "none";
            if(ch) {
                frame.src = `https://www.youtube.com/embed/${ch.id}?autoplay=1&controls=0&cc_load_policy=1&cc_lang_pref=id&hl=id`;
                document.getElementById('display-name').innerText = ch.name;
                document.getElementById('display-type').innerText = ch.type.toUpperCase() + " TV";
                info.classList.add('show');
                setTimeout(() => info.classList.remove('show'), 5000);
            }
        }
    });

    window.addEventListener('keydown', (e) => {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        if (e.key === "ArrowUp" || e.keyCode === 427) {
            let next = (currentIdx + 1) % currentList.length;
            update(ref(db, 'conecta_tv'), { current_idx: next, power: "ON" });
        }
        if (e.key === "ArrowDown" || e.keyCode === 428) {
            let prev = (currentIdx - 1 + currentList.length) % currentList.length;
            update(ref(db, 'conecta_tv'), { current_idx: prev, power: "ON" });
        }
    });
</script>
</body>
</html>
