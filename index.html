<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>ZEII OS - Final Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; overflow: hidden; }
        body { background: #000; font-family: 'Segoe UI', sans-serif; cursor: none; color: white; }
        
        #tv-screen { position: relative; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* No Signal */
        #no-signal { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #00008b; display: none; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 5;
        }

        /* Input Nomor Atas Kiri */
        #input-display {
            position: absolute; top: 20px; left: 20px; font-size: 7rem;
            color: #00fbff; font-weight: bold; text-shadow: 4px 4px 15px #000;
            z-index: 100; font-family: monospace;
        }

        /* OSD Banner */
        #osd { 
            position: absolute; bottom: 8%; left: 5%; 
            background: rgba(0, 0, 0, 0.85); padding: 15px 40px; 
            border-left: 12px solid #00fbff; opacity: 0; transition: 0.3s; z-index: 10;
        }
        #osd.active { opacity: 1; }

        /* Secret Menu 0000 (Scrollable) */
        #secret-menu {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 500px; height: 400px; background: rgba(15, 15, 15, 0.98); 
            border: 4px solid #00fbff; display: none; z-index: 150; 
            box-shadow: 0 0 100px #000; flex-direction: column;
        }
        #menu-list { flex: 1; overflow-y: auto; padding: 10px; }
        .menu-item { 
            padding: 12px; border-bottom: 1px solid #333; 
            display: flex; justify-content: space-between; font-size: 1.1rem;
        }
        .menu-item.selected { background: #00fbff; color: #000; font-weight: bold; }
        .menu-footer { background: #00fbff; color: #000; padding: 5px; text-align: center; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body onclick="initTV()">

    <div id="tv-screen">
        <div id="input-display"></div>
        <div id="no-signal"><div style="border:5px solid white; padding:20px;"><h1>TIDAK ADA SINYAL</h1></div></div>

        <video id="video-player" playsinline autoplay></video>

        <div id="osd">
            <h1 id="osd-num">01</h1>
            <div id="osd-name" style="font-size: 2rem; font-weight: bold;">AKTV</div>
            <div style="color: #00fbff; margin-top: 5px;">DTV - INDONESIA</div>
        </div>

        <div id="secret-menu">
            <div style="padding:15px; background:#222; border-bottom:2px solid #00fbff;">DAFTAR SALURAN TV</div>
            <div id="menu-list"></div>
            <div class="menu-footer">TEKAN 0101 UNTUK KELUAR MENU</div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video-player');
        const osd = document.getElementById('osd');
        const noSignal = document.getElementById('no-signal');
        const inputDisplay = document.getElementById('input-display');
        const secretMenu = document.getElementById('secret-menu');
        const menuList = document.getElementById('menu-list');
        
        let channels = [];
        let currentIndex = 0;
        let numBuffer = "";
        let hls = new Hls();

        // Load Data M3U
        fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent("https://iptv-org.github.io/iptv/languages/ind.m3u"))
            .then(res => res.text())
            .then(data => {
                const lines = data.split('\n');
                let id = 1;
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF')) {
                        const name = lines[i].split(',')[1].trim();
                        const url = lines[i+1]?.trim();
                        if(url) {
                            channels.push({ id: id++, name, url });
                            // Tambah ke menu scroll
                            const div = document.createElement('div');
                            div.className = 'menu-item';
                            div.id = `ch-item-${channels.length-1}`;
                            div.innerHTML = `<span>${channels.length}. ${name}</span><span>DTV</span>`;
                            menuList.appendChild(div);
                        }
                    }
                }
                playChannel(0);
            });

        function playChannel(index) {
            if (index < 0) index = channels.length - 1;
            if (index >= channels.length) index = 0;
            currentIndex = index;
            
            const ch = channels[index];
            noSignal.style.display = 'none';
            
            // OSD Update
            document.getElementById('osd-num').innerText = ch.id.toString().padStart(2, '0');
            document.getElementById('osd-name').innerText = ch.name;
            osd.classList.add('active');
            clearTimeout(window.osdTimer);
            window.osdTimer = setTimeout(() => osd.classList.remove('active'), 5000);

            // Highlight di menu jika terbuka
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('selected'));
            const currentItem = document.getElementById(`ch-item-${index}`);
            if(currentItem) {
                currentItem.classList.add('selected');
                currentItem.scrollIntoView({ block: 'center' });
            }

            // Engine HLS
            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls();
                hls.loadSource(ch.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
                hls.on(Hls.Events.ERROR, (e, data) => { if(data.fatal) noSignal.style.display = 'flex'; });
            }
        }

        window.addEventListener('keydown', (e) => {
            const code = e.keyCode;
            const key = e.key;

            // Navigasi PR/CH (Up/Down)
            const isUp = (key === "ArrowUp" || code === 427 || code === 33);
            const isDown = (key === "ArrowDown" || code === 428 || code === 34);

            if (isUp) playChannel(currentIndex - 1);
            if (isDown) playChannel(currentIndex + 1);

            // Input Nomor Shortcut
            if (/[0-9]/.test(key)) {
                numBuffer += key;
                inputDisplay.innerText = numBuffer;
                
                clearTimeout(window.numTimer);
                window.numTimer = setTimeout(() => {
                    if (numBuffer === "0000") {
                        secretMenu.style.display = 'flex';
                    } else if (numBuffer === "0101") {
                        secretMenu.style.display = 'none';
                    } else {
                        const target = parseInt(numBuffer) - 1;
                        if (channels[target]) playChannel(target);
                    }
                    numBuffer = "";
                    inputDisplay.innerText = "";
                }, 1200);
            }
        });

        function initTV() {
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            video.play();
        }
    </script>
</body>
</html>
