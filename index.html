<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONECTA T.O V4 - PREMIUM</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; cursor: none; color: #fff; font-family: 'Arial Black', sans-serif; }
        
        /* Booting Premium (Hanya Sekali) */
        #booting-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #222 0%, #000 100%);
            z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .boot-loader {
            width: 100px; height: 100px; border: 5px solid #333; border-top: 5px solid #ff0000;
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        .boot-text { font-size: 2.5rem; letter-spacing: 15px; font-weight: 900; text-shadow: 0 0 20px #ff0000; }

        /* Player YouTube */
        #yt-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        iframe { width: 100%; height: 100%; border: none; pointer-events: none; }

        /* Dashboard Info Modern */
        #dashboard {
            position: absolute; bottom: 5%; left: 3%; right: 3%;
            background: rgba(0, 0, 0, 0.85); border-left: 12px solid #ff0000;
            padding: 20px 40px; display: flex; align-items: center;
            transform: translateY(200%); transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 500; backdrop-filter: blur(10px);
        }
        #dashboard.show { transform: translateY(0); }
        .ch-title { font-size: 4rem; margin: 0; color: #fff; text-transform: uppercase; }
        .ch-info-tags { display: flex; gap: 10px; margin-bottom: 5px; }
        .tag { padding: 4px 12px; font-size: 0.8rem; border-radius: 4px; font-weight: bold; }
        .tag-live { background: #ff0000; animation: pulse 1s infinite; }
        .tag-geo { background: #0056b3; }
        .tag-sub { background: #28a745; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="booting-screen">
    <div class="boot-loader"></div>
    <div class="boot-text">CONECTA T.O</div>
</div>

<div id="yt-container">
    <iframe id="main-frame" allow="autoplay; fullscreen"></iframe>
</div>

<div id="dashboard">
    <div style="flex-grow: 1;">
        <div class="ch-info-tags">
            <span class="tag tag-live">● LIVE</span>
            <span class="tag tag-geo" id="meta-geo">INDONESIA</span>
            <span class="tag tag-sub">AUTO-SUB: ID</span>
        </div>
        <h1 class="ch-title" id="meta-name">LOADING...</h1>
        <p id="meta-lang" style="margin: 5px 0 0 0; color: #aaa; font-size: 1rem;">Bahasa: Indonesia</p>
    </div>
    <div id="ch-num-big" style="font-size: 5rem; font-weight: 900; color: rgba(255,255,255,0.1);">01</div>
</div>

<script>
    const channels = [
        { name: "iNews TV", id: "Kz3FK5FbBz8", geo: "INDONESIA", lang: "Indonesia" },
        { name: "Metro TV", id: "AUE5iHINUIw", geo: "INDONESIA", lang: "Indonesia" },
        { name: "TVRI Nasional", id: "sAFSy3ys-ns", geo: "INDONESIA", lang: "Indonesia" },
        { name: "TVRI World", id: "eE5E8MXQpqc", geo: "GLOBAL", lang: "English" },
        { name: "TVRI Sport", id: "6a23sxk5_vM", geo: "INDONESIA", lang: "Indonesia" },
        { name: "Kompas TV", id: "2MC5ltEDu7w", geo: "INDONESIA", lang: "Indonesia" },
        { name: "CNN Indonesia", id: "YbQwgoMoztA", geo: "INDONESIA", lang: "Indonesia" },
        { name: "DW News", id: "lCp-9YihW-c", geo: "JERMAN", lang: "English" },
        { name: "Al Jazeera", id: "_HviSyC7zSU", geo: "QATAR", lang: "English" },
        { name: "Upin Ipin Live", id: "live_stream?channel=UCp0C_O9vV3-O3_Vn2p8mC9g", geo: "MALAYSIA", lang: "Melayu" }
    ];

    let currentIdx = 0;
    const frame = document.getElementById('main-frame');
    const dash = document.getElementById('dashboard');
    const boot = document.getElementById('booting-screen');

    function changeChannel(idx) {
        const ch = channels[idx];
        
        // Update UI
        document.getElementById('meta-name').innerText = ch.name;
        document.getElementById('meta-geo').innerText = ch.geo;
        document.getElementById('meta-lang').innerText = `Bahasa: ${ch.lang}`;
        document.getElementById('ch-num-big').innerText = (idx + 1).toString().padStart(2, '0');

        // URL YouTube dengan Paksa Subtitle (cc_load_policy=1 & cc_lang_pref=id)
        const baseUrl = ch.id.includes('live_stream') ? 
            `https://www.youtube.com/embed/${ch.id}` : 
            `https://www.youtube.com/embed/${ch.id}`;
            
        frame.src = `${baseUrl}?autoplay=1&controls=0&rel=0&cc_load_policy=1&cc_lang_pref=id&hl=id`;

        // Tampilkan Dashboard
        dash.classList.add('show');
        setTimeout(() => dash.classList.remove('show'), 6000);
    }

    // Booting Sequence
    window.onload = () => {
        setTimeout(() => {
            boot.style.display = "none";
            changeChannel(currentIdx);
        }, 4000);
    };

    // Remote Control (PR/CH)
    window.addEventListener('keydown', (e) => {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();

        if (e.key === "ArrowUp" || e.key === "ChannelUp" || e.keyCode === 427) {
            currentIdx = (currentIdx + 1) % channels.length;
            changeChannel(currentIdx);
        } else if (e.key === "ArrowDown" || e.key === "ChannelDown" || e.keyCode === 428) {
            currentIdx = (currentIdx - 1 + channels.length) % channels.length;
            changeChannel(currentIdx);
        }
    });
</script>
</body>
</html>
