<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONECTA T.O PREMIUM</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; cursor: none; color: #fff; font-family: 'Segoe UI', sans-serif; }
        
        /* Booting Hanya Sekali */
        #booting-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s ease;
        }
        .logo-box { border: 4px solid #fff; padding: 20px 40px; animation: glow 2s infinite; }
        .boot-text { font-size: 3.5rem; font-weight: 900; letter-spacing: 15px; }

        /* Dashboard Info Channel */
        #channel-dashboard {
            position: absolute; bottom: 5%; left: 5%; right: 5%;
            background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.7));
            padding: 25px; border-left: 10px solid #ff0000;
            display: flex; align-items: center; gap: 30px;
            transform: translateY(150%); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 500; border-radius: 0 15px 15px 0;
        }
        #channel-dashboard.show { transform: translateY(0); }

        .ch-main { flex-grow: 1; }
        .ch-name { font-size: 4rem; font-weight: 900; margin: 0; text-transform: uppercase; line-height: 1; color: #fff; }
        .ch-meta { display: flex; gap: 15px; margin-top: 10px; font-weight: bold; font-size: 1.1rem; }
        
        /* Badges */
        .badge { padding: 5px 15px; border-radius: 5px; text-transform: uppercase; font-size: 0.9rem; }
        .badge-live { background: #ff0000; animation: blink 1s infinite; }
        .badge-lang { background: #444; border: 1px solid #666; }
        .badge-country { background: #0056b3; }

        /* Iframe & Bang Icon */
        iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; }
        #error-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 400; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .bang { font-size: 15rem; color: #ff0000; animation: bounce 0.5s infinite alternate; }

        @keyframes glow { 0%, 100% { box-shadow: 0 0 20px #fff; } 50% { box-shadow: 0 0 50px #ff0000; } }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.15); } }
    </style>
</head>
<body>

<div id="booting-screen">
    <div class="logo-box">
        <div class="boot-text">CONECTA T.O</div>
    </div>
    <p style="margin-top: 20px; letter-spacing: 5px; color: #888;">SYSTEM STARTING...</p>
</div>

<div id="error-overlay">
    <div class="bang">!</div>
    <h1 style="color:#f00; letter-spacing:10px;">SINYAL HILANG</h1>
</div>

<iframe id="tv-frame" allow="autoplay; fullscreen"></iframe>

<div id="channel-dashboard">
    <div class="ch-main">
        <div class="ch-meta">
            <span id="meta-idx" style="color: #ff0000;">CH 01</span>
            <span class="badge badge-live">● LIVE</span>
            <span class="badge badge-country" id="meta-country">🇮🇩 INDONESIA</span>
            <span class="badge badge-lang" id="meta-lang">BAHASA</span>
        </div>
        <h1 class="ch-name" id="meta-name">LOADING...</h1>
    </div>
</div>

<script>
    const channels = [
        { name: "iNews TV", url: "https://www.youtube.com/embed/Kz3FK5FbBz8?autoplay=1&controls=0", country: "🇮🇩 INDONESIA", lang: "BAHASA", live: true },
        { name: "Metro TV", url: "https://www.youtube.com/embed/AUE5iHINUIw?autoplay=1&controls=0", country: "🇮🇩 INDONESIA", lang: "BAHASA", live: true },
        { name: "TVRI Nasional", url: "https://www.youtube.com/embed/sAFSy3ys-ns?autoplay=1&controls=0", country: "🇮🇩 INDONESIA", lang: "BAHASA", live: true },
        { name: "TVRI World", url: "https://www.youtube.com/embed/eE5E8MXQpqc?autoplay=1&controls=0", country: "🌐 GLOBAL", lang: "ENGLISH", live: true },
        { name: "TVRI Sport", url: "https://www.youtube.com/embed/6a23sxk5_vM?autoplay=1&controls=0", country: "🇮🇩 INDONESIA", lang: "BAHASA", live: true },
        { name: "Upin Ipin (Les' Copaque)", url: "https://www.youtube.com/embed/live_stream?channel=UCp0C_O9vV3-O3_Vn2p8mC9g&autoplay=1&controls=0", country: "🇲🇾 MALAYSIA", lang: "MELAYU", live: "AUTO" },
        { name: "RTV", url: "https://www.rtv.co.id/livertv.php", country: "🇮🇩 INDONESIA", lang: "BAHASA", live: true },
        { name: "TRANS 7", url: "https://www.transtv.co.id/live/trans7", country: "🇮🇩 INDONESIA", lang: "BAHASA", live: true }
    ];

    let currentIdx = 0;
    const frame = document.getElementById('tv-frame');
    const dash = document.getElementById('channel-dashboard');
    const boot = document.getElementById('booting-screen');

    function updateDash(idx) {
        const ch = channels[idx];
        document.getElementById('meta-idx').innerText = `CH ${(idx+1).toString().padStart(2, '0')}`;
        document.getElementById('meta-name').innerText = ch.name;
        document.getElementById('meta-country').innerText = ch.country;
        document.getElementById('meta-lang').innerText = ch.lang;
        
        dash.classList.add('show');
        setTimeout(() => dash.classList.remove('show'), 5000);
    }

    function changeCH(idx) {
        const ch = channels[idx];
        frame.src = ch.url;
        updateDash(idx);
    }

    // Jalankan Booting Sekali Saja
    window.onload = () => {
        setTimeout(() => {
            boot.style.opacity = "0";
            setTimeout(() => boot.style.display = "none", 1000);
            changeCH(currentIdx);
        }, 3500);
    };

    window.addEventListener('keydown', (e) => {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();

        if (e.key === "ArrowUp" || e.key === "ChannelUp" || e.keyCode === 427) {
            currentIdx = (currentIdx + 1) % channels.length;
            changeCH(currentIdx);
        } else if (e.key === "ArrowDown" || e.key === "ChannelDown" || e.keyCode === 428) {
            currentIdx = (currentIdx - 1 + channels.length) % channels.length;
            changeCH(currentIdx);
        }
    });
</script>
</body>
</html>
