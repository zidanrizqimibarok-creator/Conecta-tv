<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>CONECTA T.O - TV SCREEN</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; color: #fff; font-family: 'Arial Black', sans-serif; cursor: none; }
        #tv-screen { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; }
        
        /* Player Fullscreen */
        #player-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Layar Putus Koneksi (!) */
        #kill-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 1000; display: none; 
            flex-direction: column; align-items: center; justify-content: center; 
        }
        .bang { font-size: 15rem; color: #ff0000; animation: bounce 0.5s infinite alternate; font-weight: 900; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }

        /* Kotak Nama Channel (Desain Lama) */
        #info-bar {
            position: absolute; bottom: 8%; left: 5%;
            background: rgba(0,0,0,0.9); padding: 15px 45px; border-left: 10px solid #ff0000;
            opacity: 0; transition: 0.4s ease; z-index: 110; pointer-events: none;
        }
        #info-bar.show { opacity: 1; }
        #ch-title { margin: 0; font-size: 3.5rem; text-transform: uppercase; font-weight: 900; color: #ffffff; }
        #ch-idx { margin: 0; color: #ff0000; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

<div id="tv-screen">
    <div id="kill-screen"><div class="bang">!</div><h1 style="color:#f00; letter-spacing:5px;">SINYAL DIPUTUS</h1></div>
    
    <div id="player-container">
        <iframe id="main-player" allow="autoplay; fullscreen"></iframe>
    </div>

    <div id="info-bar">
        <p id="ch-idx">CHANNEL 01</p>
        <h2 id="ch-title">LOADING...</h2>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBoS3INezO0UQptcXYNZFbnPbmmf_hU8xc",
        authDomain: "xbook-global26.firebaseapp.com",
        databaseURL: "https://xbook-global26-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "xbook-global26",
        appId: "1:384795261277:web:6a2b05dbea819b4f4590b4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const channels = [
        { name: "Upin Ipin Live", id: "live_stream?channel=UCp0C_O9vV3-O3_Vn2p8mC9g" },
        { name: "Disney Kids", id: "P2v6i_L_S_0" },
        { name: "Marvel TV", id: "rS8_6t6SIsE" },
        { name: "Boomerang TV", id: "65IsA_SshL4" },
        { name: "Disney Channel", id: "w7pYhp496tg" },
        { name: "TVRI World", id: "eE5E8MXQpqc" },
        { name: "TVRI Sport", id: "6a23sxk5_vM" },
        { name: "Kompas TV", id: "2MC5ltEDu7w" },
        { name: "CNN Indonesia", id: "YbQwgoMoztA" },
        { name: "Al Jazeera", id: "_HviSyC7zSU" }
    ];

    const frame = document.getElementById('main-player');
    const kill = document.getElementById('kill-screen');
    const infoBar = document.getElementById('info-bar');
    let currentIdx = 0;

    // Sinkronisasi dengan Firebase
    onValue(ref(db, 'conecta_status'), (snapshot) => {
        const data = snapshot.val();
        if(!data) return;

        if (data.connection === "OFF") {
            kill.style.display = "flex";
            frame.src = "";
        } else {
            kill.style.display = "none";
            currentIdx = data.current_ch || 0;
            const ch = channels[currentIdx];
            
            // Set URL dengan Paksa Subtitle Indo
            frame.src = `https://www.youtube.com/embed/${ch.id}?autoplay=1&controls=0&cc_load_policy=1&cc_lang_pref=id&hl=id`;
            
            // Munculkan Info Bar
            document.getElementById('ch-idx').innerText = `CHANNEL ${(currentIdx + 1).toString().padStart(2, '0')}`;
            document.getElementById('ch-title').innerText = ch.name;
            infoBar.classList.add('show');
            setTimeout(() => infoBar.classList.remove('show'), 5000);
        }
    });

    // Tombol PR/CH Remote Aktif Lagi
    window.addEventListener('keydown', (e) => {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();

        if (e.key === "ArrowUp" || e.key === "ChannelUp" || e.keyCode === 427) {
            let next = (currentIdx + 1) % channels.length;
            set(ref(db, 'conecta_status/current_ch'), next);
        } else if (e.key === "ArrowDown" || e.key === "ChannelDown" || e.keyCode === 428) {
            let prev = (currentIdx - 1 + channels.length) % channels.length;
            set(ref(db, 'conecta_status/current_ch'), prev);
        }
    });
</script>
</body>
</html>
