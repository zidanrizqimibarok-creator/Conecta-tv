<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>ZEII OS - Digital TV Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; overflow: hidden; }
        body { background: #000; font-family: 'Segoe UI', sans-serif; cursor: none; color: white; }
        
        #tv-screen { position: relative; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* Layar No Signal (Biru Analog) */
        #no-signal { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #00008b; display: none; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 5;
        }
        .msg-box { border: 4px solid white; padding: 20px; text-align: center; }

        /* Input Nomor di Atas Kiri */
        #input-display {
            position: absolute; top: 30px; left: 30px; font-size: 5rem;
            color: #00fbff; font-weight: bold; text-shadow: 2px 2px 10px #000;
            z-index: 50; font-family: monospace;
        }

        /* OSD (On Screen Display) */
        #osd { 
            position: absolute; bottom: 8%; left: 5%; 
            background: linear-gradient(90deg, rgba(0,0,30,0.9), transparent);
            padding: 15px 30px; border-left: 10px solid #00fbff;
            opacity: 0; transition: 0.4s; z-index: 10;
        }
        #osd.active { opacity: 1; }
        #osd h1 { font-size: 4.5rem; line-height: 1; }

        /* Modal Menu 0000 */
        #secret-menu {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 400px; background: #1a1a1a; border: 3px solid #00fbff;
            padding: 20px; display: none; z-index: 100; text-align: center;
        }
        #secret-menu h2 { color: #00fbff; margin-bottom: 10px; }
        .btn-close { margin-top: 15px; background: red; color: white; padding: 5px 10px; border: none; }
    </style>
</head>
<body onclick="initTV()">

    <div id="tv-screen">
        <div id="input-display"></div>

        <div id="no-signal">
            <div class="msg-box">
                <h1>TIDAK ADA SINYAL</h1>
                <p>MENCARI ALIRAN DATA...</p>
            </div>
        </div>

        <video id="video-player" playsinline autoplay></video>

        <div id="osd">
            <h1 id="osd-num">01</h1>
            <div id="osd-name" style="font-size: 1.5rem;">MEMUAT...</div>
            <div style="font-size: 0.8rem; background: #00fbff; color: #000; display: inline-block; padding: 2px 5px; margin-top: 5px;">DIGITAL A-1</div>
        </div>

        <div id="secret-menu">
            <h2>MENU PENGATURAN</h2>
            <p>Saluran: <span id="stat-count">0</span> Saluran Aktif</p>
            <p style="font-size: 0.8rem; margin-top: 10px;">Gunakan Discord: <br><strong>discord.gg/zeii-iptv</strong></p>
            <div style="color: yellow; font-size: 0.7rem; margin-top: 10px;">Tekan PR/CH Atas/Bawah untuk Menutup</div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video-player');
        const osd = document.getElementById('osd');
        const noSignal = document.getElementById('no-signal');
        const inputDisplay = document.getElementById('input-display');
        const secretMenu = document.getElementById('secret-menu');
        
        let channels = [];
        let currentIndex = 0;
        let numBuffer = "";
        let hls = new Hls();

        // 1. Ambil Data M3U
        fetch('https://iptv-org.github.io/iptv/languages/ind.m3u')
            .then(res => res.text())
            .then(data => {
                const lines = data.split('\n');
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF')) {
                        const name = lines[i].split(',')[1].trim();
                        const url = lines[i+1].trim();
                        channels.push({ name, url });
                    }
                }
                document.getElementById('stat-count').innerText = channels.length;
                playChannel(0);
            });

        function playChannel(index) {
            if (index < 0) index = channels.length - 1;
            if (index >= channels.length) index = 0;
            currentIndex = index;
            
            const ch = channels[index];
            noSignal.style.display = 'none';
            
            // UI OSD
            document.getElementById('osd-num').innerText = (index + 1).toString().padStart(2, '0');
            document.getElementById('osd-name').innerText = ch.name;
            osd.classList.add('active');
            setTimeout(() => osd.classList.remove('active'), 5000);

            // Engine Play
            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls({
                    manifestLoadingTimeOut: 10000,
                    fragLoadingTimeOut: 10000
                });
                hls.loadSource(ch.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(() => { noSignal.style.display = 'flex'; });
                });

                // Deteksi Sinyal Hilang (Buffering/Error)
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) noSignal.style.display = 'flex';
                });
            }
        }

        // --- MESIN NAVIGASI KOMPLEKS ---
        window.addEventListener('keydown', (e) => {
            // Log untuk debug di console TV jika perlu
            console.log("Key Pressed: " + e.key + " Code: " + e.keyCode);

            // 1. Navigasi Channel (Support Berbagai Remote TV)
            if (e.key === "ChannelUp" || e.key === "ArrowUp" || e.keyCode === 427 || e.keyCode === 33) {
                if (secretMenu.style.display === 'block') {
                    secretMenu.style.display = 'none';
                } else {
                    playChannel(currentIndex + 1);
                }
            }
            if (e.key === "ChannelDown" || e.key === "ArrowDown" || e.keyCode === 428 || e.keyCode === 34) {
                if (secretMenu.style.display === 'block') {
                    secretMenu.style.display = 'none';
                } else {
                    playChannel(currentIndex - 1);
                }
            }

            // 2. Shortcut Nomor & Kode 0000
            if (/[0-9]/.test(e.key)) {
                numBuffer += e.key;
                inputDisplay.innerText = numBuffer;
                
                clearTimeout(window.numTimer);
                window.numTimer = setTimeout(() => {
                    // Cek Secret Code
                    if (numBuffer === "0000") {
                        secretMenu.style.display = 'block';
                    } else {
                        const target = parseInt(numBuffer) - 1;
                        if (channels[target]) playChannel(target);
                    }
                    numBuffer = "";
                    inputDisplay.innerText = "";
                }, 1500);
            }
        });

        function initTV() {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
            video.play();
        }
    </script>
</body>
</html>
