<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEII OS - Ultimate Digital TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; overflow: hidden; }
        body { background: #000; font-family: 'Segoe UI', sans-serif; cursor: none; color: white; }
        
        #tv-container { position: relative; width: 100vw; height: 100vh; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* No Signal Overlay */
        #no-signal { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #00008b; display: none; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 5;
        }
        .signal-box { border: 5px solid white; padding: 30px; text-align: center; }

        /* Input Nomor (Atas Kiri) */
        #num-overlay {
            position: absolute; top: 20px; left: 20px; font-size: 8rem;
            color: #00fbff; font-weight: bold; text-shadow: 5px 5px 20px #000;
            z-index: 100; font-family: 'Courier New', monospace;
        }

        /* OSD Banner (Bawah) */
        #osd { 
            position: absolute; bottom: 8%; left: 5%; 
            background: rgba(0, 0, 0, 0.9); padding: 20px 50px; 
            border-left: 15px solid #00fbff; opacity: 0; transition: 0.2s; z-index: 10;
        }
        #osd.active { opacity: 1; }
        #osd h1 { font-size: 5rem; line-height: 1; margin: 0; }
        #osd .name { font-size: 2.5rem; font-weight: bold; text-transform: uppercase; }

        /* Menu 0000 (Scrollable) */
        #menu-tv {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 500px; height: 450px; background: rgba(10, 10, 10, 0.98); 
            border: 5px solid #00fbff; display: none; z-index: 200; flex-direction: column;
        }
        #menu-header { padding: 15px; background: #00fbff; color: #000; font-weight: bold; text-align: center; }
        #menu-list { flex: 1; overflow-y: auto; padding: 10px; scroll-behavior: smooth; }
        .ch-row { padding: 12px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
        .ch-row.active { background: #00fbff; color: #000; font-weight: bold; }
        #menu-footer { padding: 10px; font-size: 0.8rem; text-align: center; background: #111; color: #00fbff; }
    </style>
</head>
<body onclick="startRemote()">

    <div id="tv-container">
        <div id="num-overlay"></div>

        <div id="no-signal">
            <div class="signal-box">
                <h1>TIDAK ADA SINYAL</h1>
                <p>MENCARI FREKUENSI...</p>
            </div>
        </div>

        <video id="player" playsinline autoplay></video>

        <div id="osd">
            <h1 id="osd-id">01</h1>
            <div class="name" id="osd-title">MEMUAT...</div>
            <div style="color:#00fbff; font-weight: bold;">DIGITAL TV INDONESIA</div>
        </div>

        <div id="menu-tv">
            <div id="menu-header">DAFTAR SALURAN (1-173)</div>
            <div id="menu-list"></div>
            <div id="menu-footer">KETIK 0101 UNTUK KELUAR</div>
        </div>
    </div>

    <script>
        const player = document.getElementById('player');
        const osd = document.getElementById('osd');
        const menuTv = document.getElementById('menu-tv');
        const noSignal = document.getElementById('no-signal');
        const numOverlay = document.getElementById('num-overlay');
        const menuList = document.getElementById('menu-list');

        let channels = [];
        let curIdx = 0;
        let numBuf = "";
        let hls = new Hls({ enableWorker: true, lowLatencyMode: true });

        // Fetch Data - Bypass CORS
        const dataUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent("https://iptv-org.github.io/iptv/languages/ind.m3u");

        fetch(dataUrl)
            .then(r => r.text())
            .then(data => {
                const lines = data.split('\n');
                let count = 1;
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF')) {
                        const name = lines[i].split(',')[1].trim();
                        const url = lines[i+1]?.trim();
                        if(url && url.startsWith('http')) {
                            channels.push({ id: count++, name, url });
                            const row = document.createElement('div');
                            row.className = 'ch-row';
                            row.id = `row-${channels.length-1}`;
                            row.innerHTML = `<span>${channels.length}. ${name}</span><span>DTV</span>`;
                            menuList.appendChild(row);
                        }
                    }
                }
                play(0);
            });

        function play(idx) {
            if (idx < 0) idx = channels.length - 1;
            if (idx >= channels.length) idx = 0;
            curIdx = idx;
            const ch = channels[idx];

            // UI Reset
            noSignal.style.display = 'none';
            document.getElementById('osd-id').innerText = ch.id.toString().padStart(2, '0');
            document.getElementById('osd-title').innerText = ch.name;
            osd.classList.add('active');
            
            // Highlight Menu
            document.querySelectorAll('.ch-row').forEach(r => r.classList.remove('active'));
            const activeRow = document.getElementById(`row-${idx}`);
            if(activeRow) {
                activeRow.classList.add('active');
                activeRow.scrollIntoView({ block: 'center' });
            }

            clearTimeout(window.osdIn);
            window.osdIn = setTimeout(() => osd.classList.remove('active'), 4000);

            // Engine
            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls({ maxBufferLength: 10 });
                hls.loadSource(ch.url);
                hls.attachMedia(player);
                hls.on(Hls.Events.MANIFEST_PARSED, () => player.play());
                hls.on(Hls.Events.ERROR, (e, d) => { if(d.fatal) noSignal.style.display = 'flex'; });
            }

            // Sinyal Check
            clearTimeout(window.sigCheck);
            window.sigCheck = setTimeout(() => {
                if(player.paused || player.readyState < 2) noSignal.style.display = 'flex';
            }, 10000);
        }

        // REMOTE HANDLER
        window.addEventListener('keydown', (e) => {
            const k = e.key;
            const c = e.keyCode;

            // PR/CH Keys (Up/Down)
            if (k === "ArrowUp" || c === 427 || c === 33) play(curIdx + 1);
            if (k === "ArrowDown" || c === 428 || c === 34) play(curIdx - 1);

            // Numeric Shortcut
            if (/[0-9]/.test(k)) {
                numBuf += k;
                numOverlay.innerText = numBuf;
                clearTimeout(window.tOut);
                window.tOut = setTimeout(() => {
                    if (numBuf === "0000") {
                        menuTv.style.display = 'flex';
                    } else if (numBuf === "0101") {
                        menuTv.style.display = 'none';
                    } else {
                        const target = parseInt(numBuf) - 1;
                        if (channels[target]) play(target);
                    }
                    numBuf = "";
                    numOverlay.innerText = "";
                }, 1000);
            }
        });

        function startRemote() {
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            player.play();
        }
    </script>
</body>
</html>
