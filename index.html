<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONECTA T.O V25 - 173 CH AUTO</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; color: #fff; font-family: 'Arial Black', sans-serif; }
        #booting { position: absolute; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .boot-text { font-size: 3rem; letter-spacing: 15px; animation: flash 1.5s infinite; }
        #tv-container { width: 100%; height: 100%; position: relative; }
        video { width: 100%; height: 100%; background: #000; position: absolute; top: 0; left: 0; }
        #no-signal-box { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 900; display: none; align-items: center; justify-content: center; }
        .error-msg { padding: 20px 50px; border: 4px solid #fff; font-size: 2.5rem; background: #000; }
        #dash { position: absolute; bottom: 5%; left: 3%; right: 3%; background: rgba(0,0,0,0.9); border-left: 12px solid #ff0000; padding: 20px 40px; transform: translateY(200%); transition: 0.5s; z-index: 950; backdrop-filter: blur(8px); }
        #dash.show { transform: translateY(0); }
        .ch-name { font-size: 3rem; margin: 0; text-transform: uppercase; line-height: 1; }
        .tag { padding: 5px 12px; font-size: 0.8rem; border-radius: 4px; margin-right: 5px; font-weight: bold; }
        .uhf-code { color: #00f2ff; font-family: monospace; font-size: 1.1rem; margin-top: 10px; display: block; }
        .mode-a { filter: grayscale(100%) contrast(1.1); }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>

<div id="booting"><div class="boot-text" id="status-load">LOADING PLAYLIST...</div></div>

<div id="tv-container">
    <div id="no-signal-box"><div class="error-msg">! NO SIGNAL</div></div>
    <video id="main-player" autoplay playsinline></video>
</div>

<div id="dash">
    <div style="margin-bottom: 5px;">
        <span class="tag" id="mode-text" style="background:#ff0000">● LIVE</span>
        <span id="ch-num" class="tag" style="background:#0056b3">CH 000</span>
    </div>
    <h1 class="ch-name" id="ch-title">MENCARI SINYAL...</h1>
    <span class="uhf-code" id="ch-uhf">UHF: -- | TF: ---.-- MHz</span>
</div>

<script>
    let channels = [];
    let current = 0;
    let signalTimer;
    const player = document.getElementById('main-player');
    const hls = new Hls();
    const dash = document.getElementById('dash');

    // MESIN AUTO-PARSER (Membaca 173+ Channel dari GitHub)
    async function loadPlaylist() {
        const url = 'https://iptv-org.github.io/iptv/languages/ind.m3u';
        try {
            const response = await fetch(url);
            const data = await response.text();
            const lines = data.split('\n');
            
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXTINF:')) {
                    const name = lines[i].split(',')[1].trim();
                    const streamUrl = lines[i+1].trim();
                    // Acak tipe Analog (A) atau Digital (D)
                    const type = Math.random() > 0.5 ? "A" : "D";
                    channels.push({ name: name, url: streamUrl, type: type });
                }
            }
            document.getElementById('status-load').innerText = "CONECTA T.O";
            setTimeout(() => { document.getElementById('booting').style.display = "none"; }, 2000);
            tune(0);
        } catch (err) {
            document.getElementById('status-load').innerText = "ERROR CONNECTION";
        }
    }

    function tune(idx) {
        if (channels.length === 0) return;
        clearInterval(signalTimer);
        document.getElementById('no-signal-box').style.display = "none";
        
        const c = channels[idx];
        document.getElementById('ch-title').innerText = c.name;
        document.getElementById('ch-num').innerText = `CH ${String(idx + 1).padStart(3, '0')}`;
        
        // UHF Otomatis (UHF 21-60)
        const uhf = 21 + (idx % 40);
        const tf = (474 + (idx * 8)).toFixed(2);
        document.getElementById('ch-uhf').innerText = `UHF: ${uhf} | TF: ${tf} MHz`;

        const modeTag = document.getElementById('mode-text');
        if (c.type === "A") {
            modeTag.innerText = "● ANALOG";
            modeTag.style.background = "#555";
            player.className = "mode-a";
            startSignalDrop();
        } else {
            modeTag.innerText = "● LIVE";
            modeTag.style.background = "#ff0000";
            player.className = "";
        }

        if (Hls.isSupported()) {
            hls.loadSource(c.url);
            hls.attachMedia(player);
            hls.on(Hls.Events.MANIFEST_PARSED, () => player.play());
        } else if (player.canPlayType('application/vnd.apple.mpegurl')) {
            player.src = c.url;
            player.play();
        }

        dash.classList.add('show');
        setTimeout(() => dash.classList.remove('show'), 5000);
    }

    function startSignalDrop() {
        signalTimer = setInterval(() => {
            document.getElementById('no-signal-box').style.display = "flex";
            player.muted = true;
            setTimeout(() => { 
                document.getElementById('no-signal-box').style.display = "none"; 
                player.muted = false;
            }, 1500);
        }, 10000);
    }

    // --- WILAYAH SAKRAL PR/CH ---
    window.addEventListener('keydown', (e) => {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {});
        }
        if (e.key === "ArrowUp" || e.keyCode === 38 || e.keyCode === 427) {
            current = (current + 1) % channels.length;
            tune(current);
        } else if (e.key === "ArrowDown" || e.keyCode === 40 || e.keyCode === 428) {
            current = (current - 1 + channels.length) % channels.length;
            tune(current);
        }
    });

    window.onload = loadPlaylist;
</script>
</body>
</html>
