<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>CONECTA T.O - ANALOG & DIGITAL</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; color: #fff; font-family: 'Arial Black', sans-serif; cursor: none; }
        #tv-screen { width: 100vw; height: 100vh; position: relative; }
        iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; }

        /* Layar No Signal (Digital) */
        #digital-error { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 1000; display: none; 
            flex-direction: column; align-items: center; justify-content: center; 
        }
        .bang { font-size: 15rem; color: #f00; animation: bounce 0.5s infinite alternate; font-weight: 900; }

        /* Efek Semut (Analog) */
        #analog-error {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1001; display: none;
            background: url('https://upload.wikimedia.org/wikipedia/commons/5/5a/Static_noise.gif');
            opacity: 0.8; background-size: cover;
        }

        #info-bar {
            position: absolute; bottom: 8%; left: 5%;
            background: rgba(0,0,0,0.9); padding: 15px 45px; border-left: 10px solid #f00;
            opacity: 0; transition: 0.4s; z-index: 1100;
        }
        #info-bar.show { opacity: 1; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }
    </style>
</head>
<body>

<div id="tv-screen">
    <div id="digital-error"><div class="bang">!</div><h1 style="color:#f00">NO SIGNAL</h1></div>
    <div id="analog-error"></div>
    
    <iframe id="main-player" allow="autoplay; fullscreen"></iframe>

    <div id="info-bar">
        <p id="ch-idx" style="margin:0; color:#f00; font-weight:bold;">CH</p>
        <h2 id="ch-title" style="margin:0; font-size:3.5rem;">LOADING...</h2>
        <span id="ch-mode" style="font-size: 0.8rem; background: #444; padding: 2px 8px;">DIGITAL</span>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = {
        apiKey: "AIzaSyBoS3INezO0UQptcXYNZFbnPbmmf_hU8xc",
        authDomain: "xbook-global26.firebaseapp.com",
        databaseURL: "https://xbook-global26-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "xbook-global26",
        appId: "1:384795261277:web:6a2b05dbea819b4f4590b4"
    };

    const app = initializeApp(config);
    const db = getDatabase(app);
    const frame = document.getElementById('main-player');
    const digiSc = document.getElementById('digital-error');
    const anaSc = document.getElementById('analog-error');
    const infoBar = document.getElementById('info-bar');

    let currentList = [];
    let currentIdx = 0;

    onValue(ref(db, 'conecta_system'), (snap) => {
        const data = snap.val();
        if(!data || !data.channels) return;

        currentList = Object.values(data.channels);
        currentIdx = data.status.current_ch || 0;
        const ch = currentList[currentIdx] || currentList[0];

        if (data.status.connection === "OFF") {
            frame.src = "";
            if (ch.mode === "analog") {
                anaSc.style.display = "block";
                digiSc.style.display = "none";
            } else {
                digiSc.style.display = "flex";
                anaSc.style.display = "none";
            }
        } else {
            anaSc.style.display = "none";
            digiSc.style.display = "none";
            frame.src = `https://www.youtube.com/embed/${ch.id}?autoplay=1&controls=0&cc_load_policy=1&cc_lang_pref=id&hl=id`;
            
            document.getElementById('ch-idx').innerText = `CH ${(currentIdx + 1).toString().padStart(2, '0')}`;
            document.getElementById('ch-title').innerText = ch.name;
            document.getElementById('ch-mode').innerText = ch.mode.toUpperCase();
            
            infoBar.classList.add('show');
            setTimeout(() => infoBar.classList.remove('show'), 5000);
        }
    });

    window.addEventListener('keydown', (e) => {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        if (e.key === "ArrowUp" || e.keyCode === 427) {
            let next = (currentIdx + 1) % currentList.length;
            update(ref(db, 'conecta_system/status'), { current_ch: next, connection: "ON" });
        }
        if (e.key === "ArrowDown" || e.keyCode === 428) {
            let prev = (currentIdx - 1 + currentList.length) % currentList.length;
            update(ref(db, 'conecta_system/status'), { current_ch: prev, connection: "ON" });
        }
    });
</script>
</body>
</html>
