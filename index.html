<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>CONECTA OS V82</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.1.5"></script>
    <style>
        /* PAKSA FULL SCREEN TANPA SISA */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; cursor: none;
        }

        #v { 
            position: fixed; top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            object-fit: fill; /* Ini biar beneran full menutupi layar */
            z-index: 1; background: #000;
        }

        /* ANTI WHITE SCREEN COVER */
        #start-overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* LOGO HD */
        #logo-conecta { position: absolute; top: 30px; right: 40px; z-index: 500; text-align: right; animation: pulse 2s infinite; pointer-events: none; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 20px #ffcc00; } }
        .hd-tag { font-size: 12px; background: #ffcc00; color: #000; padding: 2px 6px; font-weight: bold; border-radius: 3px; }
        .con-text { font-size: 2.2rem; font-weight: 900; color: #ffcc00; border-bottom: 4px solid #00ff88; display: block; }

        /* HOME & SETTINGS (TRANSPARAN) */
        #home, #settings-ui { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); color: #00ff88;
        }

        .menu-row { display: flex; gap: 30px; }
        .card { 
            width: 200px; height: 180px; border: 4px solid #333; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); transition: 0.3s;
        }
        .card.active { border-color: #00ff88; background: rgba(0,255,136,0.3); transform: scale(1.1); }

        /* INFO BOX */
        #info { 
            position:absolute; bottom:50px; left:50px; padding:30px; 
            background: rgba(0,25,10,0.95); z-index:99; width:600px; 
            display:none; border-left: 10px solid #00ff88; color: #00ff88;
        }
        #loading-bar-container { width: 100%; height: 8px; background: #111; margin-top: 15px; border-radius: 4px; overflow: hidden; }
        #loading-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #ffcc00, #00ff88); transition: width 0.3s; }

        /* NO SIGNAL */
        #alert-center { 
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); 
            font-size:3.5rem; color:#ff4444; border:6px solid #ff4444; padding:40px; 
            display:none; z-index:110; background:#000; text-align:center; font-weight: bold;
        }
        
        #num { position: absolute; top: 40px; left: 40px; font-size: 100px; color: rgba(0,255,136,0.2); font-weight: 900; z-index: 100; }
    </style>
</head>
<body onclick="bootSystem()">

    <div id="start-overlay">
        <h1 style="color: #ffcc00; letter-spacing: 5px;">CONECTA OS V82</h1>
        <p style="color: #00ff88;">KLIK LAYAR UNTUK MEMULAI</p>
    </div>

    <video id="v" autoplay playsinline></video>

    <div id="alert-center">SINYAL TERACAK<br><small style="font-size: 1.5rem; color: #fff;">CEK KONEKSI ANTENA</small></div>

    <div id="home">
        <h1 style="color: #ffcc00; font-size: 3rem; margin-bottom: 30px;">CONECTA OS</h1>
        <div class="menu-row">
            <div class="card active" id="m0"><i>📺</i><h2>TV MODE</h2></div>
            <div class="card" id="m1"><i>🌐</i><h2>BROWSER</h2></div>
            <div class="card" id="m2"><i>⚙️</i><h2>SETTINGS</h2></div>
        </div>
    </div>

    <div id="settings-ui">
        <h1 style="color:#ffcc00">SYSTEM SETTINGS</h1>
        <div id="scan-list" style="width: 80%; background: rgba(0,0,0,0.5); padding: 20px; border-radius: 15px; margin-top: 20px; border: 1px solid #333;">
            <h3 style="border-bottom: 2px solid #00ff88; padding-bottom: 10px;">SIGNAL ANALYZER</h3>
            <div id="list-content">Scanning...</div>
        </div>
        <p style="margin-top:20px;">TEKAN [0] UNTUK KEMBALI</p>
    </div>

    <div id="logo-conecta"><span class="hd-tag">HD</span><span class="con-text">CONECTA TV</span></div>
    <div id="num"></div>
    
    <div id="info">
        <h1 id="n"></h1>
        <p id="m-txt" style="color:#ffcc00"></p>
        <div style="display:flex; justify-content:space-between; margin-top:10px;">
            <span>STATUS: <span id="status-text">BUFFERING</span></span>
            <span id="load-pc">0%</span>
        </div>
        <div id="loading-bar-container"><div id="loading-bar"></div></div>
    </div>

    <script>
        const v = document.getElementById('v');
        const h = new Hls();
        let ch = [], cur = 0, b = "", mode = "AVS1", menuIdx = 0, currentApp = 'home', signalTimer;

        function bootSystem() {
            document.getElementById('start-overlay').style.display = 'none';
            document.documentElement.requestFullscreen();
            openApp('home'); 
            loadChannels();
        }

        function openApp(app) {
            currentApp = app;
            document.getElementById('home').style.display = (app === 'home') ? 'flex' : 'none';
            document.getElementById('settings-ui').style.display = (app === 'settings') ? 'flex' : 'none';
            if(app === 'settings') runAnalyzer();
        }

        function runAnalyzer() {
            const content = document.getElementById('list-content');
            let html = "";
            for(let i=0; i<5; i++) {
                if(ch[i]) {
                    let st = (Math.random() > 0.4) ? "ACTIVE" : "OFFLINE";
                    html += `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #222;">
                                <span>${ch[i].name}</span>
                                <span style="color:${st === 'ACTIVE' ? '#00ff88' : '#ff4444'}">${st}</span>
                             </div>`;
                }
            }
            content.innerHTML = html;
        }

        function play(i) {
            if (ch.length === 0) return;
            cur = (i < 0) ? ch.length - 1 : (i >= ch.length) ? 0 : i;
            
            document.getElementById('alert-center').style.display = 'none';
            document.getElementById('info').style.display = 'block';
            document.getElementById('loading-bar').style.width = "0%";
            document.getElementById('load-pc').innerText = "0%";
            document.getElementById('status-text').innerText = "BUFFERING";

            if (Hls.isSupported()) {
                h.loadSource(ch[cur].url);
                h.attachMedia(v);
            }

            // LOGIKA 10 DETIK REAL
            clearTimeout(signalTimer);
            signalTimer = setTimeout(() => {
                if (v.readyState < 3) {
                    h.stopLoad();
                    document.getElementById('alert-center').style.display = 'block';
                    document.getElementById('info').style.display = 'none';
                }
            }, 10000); 

            document.getElementById('n').innerText = (cur+1) + ". " + ch[cur].name;
            document.getElementById('m-txt').innerText = "CONECTA HD ENGINE";
        }

        v.onplaying = () => {
            clearTimeout(signalTimer);
            document.getElementById('status-text').innerText = "CONNECTED";
            document.getElementById('loading-bar').style.width = "100%";
            document.getElementById('load-pc').innerText = "100%";
            setTimeout(() => { document.getElementById('info').style.display = 'none'; }, 2000);
        };

        window.addEventListener('keydown', (e) => {
            const c = e.keyCode; const key = e.key;

            if (currentApp === 'settings' && key === "0") { openApp('home'); return; }

            if (currentApp === 'home') {
                if (c == 33 || c == 427 || key == "ArrowUp") { menuIdx = (menuIdx + 1) % 3; updateMenu(); }
                if (c == 34 || c == 428 || key == "ArrowDown") { menuIdx = (menuIdx - 1 + 3) % 3; updateMenu(); }
            }

            if (/[0-9]/.test(key)) {
                b += key; document.getElementById('num').innerText = b;
                clearTimeout(window.t);
                window.t = setTimeout(() => {
                    if (currentApp === 'home' && b.length === 1) {
                        if (b === "1") openApp('tv');
                        if (b === "3") openApp('settings');
                    } else if (b === "0000") { mode = (mode === "AVS1" ? "AVS2" : "AVS1"); loadChannels(); }
                    else if (b === "1111") openApp('home');
                    else if (b === "82") location.reload();
                    else {
                        let target = parseInt(b) - 1;
                        if (ch[target]) { openApp('tv'); play(target); }
                    }
                    b = ""; document.getElementById('num').innerText = "";
                }, 700);
            }

            if (currentApp === 'tv') {
                if (c == 33 || c == 427 || key == "ArrowUp") play(cur + 1);
                if (c == 34 || c == 428 || key == "ArrowDown") play(cur - 1);
            }
        });

        function updateMenu() {
            document.querySelectorAll('.card').forEach((m, i) => {
                m.className = (i === menuIdx) ? 'card active' : 'card';
            });
        }

        function loadChannels() {
            let url = (mode === "AVS1") ? "https://iptv-org.github.io/iptv/languages/ind.m3u" : "https://iptv-org.github.io/iptv/categories/kids.m3u";
            fetch(url).then(r => r.text()).then(d => {
                ch = [];
                const lines = d.split('\n');
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].includes('#EXTINF')) ch.push({ name: lines[i].split(',')[1].trim(), url: lines[i+1].trim() });
                }
            });
        }
    </script>
</body>
</html>
