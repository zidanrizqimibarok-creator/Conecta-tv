<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>CONECTA TV V14.4</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        /* Layar Utama */
        #tv-screen { width: 100vw; height: 100vh; position: relative; display: block; }
        
        /* Watermark */
        #watermark {
            position: absolute; top: 30px; right: 40px;
            font-size: 1.2rem; font-weight: 900; color: rgba(255,255,255,0.4);
            z-index: 100; letter-spacing: 5px; pointer-events: none;
        }

        /* Video Player */
        iframe { 
            width: 100%; height: 100%; border: none; 
            position: absolute; z-index: 10; pointer-events: none;
        }

        /* Noise (Semut TV) */
        #noise { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: url('https://upload.wikimedia.org/wikipedia/commons/5/5a/Static_noise.gif'); 
            z-index: 20; opacity: 0; pointer-events: none;
        }

        /* Kotak Nama (Desain Baru) */
        #info-bar { 
            position: absolute; bottom: 10%; left: 5%; 
            background: linear-gradient(to right, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            padding: 20px 80px 20px 30px; 
            opacity: 0; transition: 0.4s ease-out; 
            z-index: 100; transform: translateY(20px);
        }
        #info-bar.show { opacity: 1; transform: translateY(0); }
        
        .digital-accent { border-left: 10px solid #00f2ff; } /* Cyan */
        .analog-accent { border-left: 10px solid #ffcc00; }  /* Gold */

        .golongan { font-size: 0.8rem; font-weight: bold; letter-spacing: 3px; margin-bottom: 5px; }
        #ch-name { margin: 0; font-size: 3.5rem; font-weight: 900; text-transform: uppercase; }

        .analog-bw { filter: grayscale(100%) contrast(110%); }
    </style>
</head>
<body onclick="startTV()">

<div id="watermark">CONECTA TV</div>

<div id="tv-screen">
    <div id="noise"></div>
    <iframe id="player" allow="autoplay; fullscreen"></iframe>

    <div id="info-bar">
        <div id="ch-gol" class="golongan">DIGITAL</div>
        <h1 id="ch-name">LOADING...</h1>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = {
        apiKey: "AIzaSyBoS3INezO0UQptcXYNZFbnPbmmf_hU8xc",
        authDomain: "xbook-global26.firebaseapp.com",
        databaseURL: "https://xbook-global26-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "xbook-global26",
        appId: "1:384795261277:web:6a2b05dbea819b4f4590b4"
    };

    const db = getDatabase(initializeApp(config));
    const player = document.getElementById('player');
    const info = document.getElementById('info-bar');
    const noise = document.getElementById('noise');

    const channels = [
        { name: "Metro TV", id: "AUE5iHINUIw", type: "digital" },
        { name: "iNews", id: "Kz3FK5FbBz8", type: "analog" },
        { name: "Boomerang", id: "6a23sxk5_vM", type: "digital" },
        { name: "Cartoon TV", id: "U8ZzsbxbYcE", type: "analog" },
        { name: "Tom TV", id: "oV5gVoZQ7xU", type: "analog" }
    ];

    let currentIdx = 0;
    let isStarted = false;
    let aInt, nInt;

    // WAJIB KLIK LAYAR UNTUK MULAI
    window.startTV = () => {
        if(isStarted) return;
        isStarted = true;
        if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
        initSync();
    };

    function initSync() {
        onValue(ref(db, 'conecta_tv/current_idx'), (snap) => {
            currentIdx = snap.val() || 0;
            renderCH();
        });
    }

    function renderCH() {
        const ch = channels[currentIdx];
        if(!ch) return;

        // Force reload link agar tidak blank
        player.src = `https://www.youtube.com/embed/${ch.id}?autoplay=1&controls=0&mute=0&rel=0&enablejsapi=1&origin=${window.location.origin}`;
        
        document.getElementById('ch-name').innerText = ch.name;
        document.getElementById('ch-gol').innerText = ch.type.toUpperCase() + " TV";
        
        // Kotak Info Logic
        info.className = (ch.type === "digital") ? "digital-accent show" : "analog-accent show";
        setTimeout(() => info.classList.remove('show'), 5000);

        // Reset Effects
        clearInterval(aInt); clearInterval(nInt);
        player.classList.remove('analog-bw'); noise.style.opacity = 0;
        
        if (ch.type === "analog") {
            aInt = setInterval(() => {
                player.classList.add('analog-bw');
                setTimeout(() => player.classList.remove('analog-bw'), 5000);
            }, 60000);
            nInt = setInterval(() => {
                noise.style.opacity = 0.15;
                setTimeout(() => noise.style.opacity = 0, 400);
            }, 5000);
        }
    }

    // Remote Logic
    window.addEventListener('keydown', async (e) => {
        if(!isStarted) return;
        let nextIdx;
        if (e.key === "ArrowUp") {
            nextIdx = (currentIdx + 1) % channels.length;
            update(ref(db, 'conecta_tv'), { current_idx: nextIdx });
        } else if (e.key === "ArrowDown") {
            nextIdx = (currentIdx - 1 + channels.length) % channels.length;
            update(ref(db, 'conecta_tv'), { current_idx: nextIdx });
        }
    });
</script>
</body>
</html>
