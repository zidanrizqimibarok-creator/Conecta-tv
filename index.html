<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>CONECTA TV V14.3</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; cursor: none;
            color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        #tv-screen { width: 100vw; height: 100vh; position: relative; }
        
        /* Watermark Depan Video */
        #watermark {
            position: absolute; top: 30px; right: 40px;
            font-size: 1.5rem; font-weight: 900; color: rgba(255,255,255,0.5);
            z-index: 100; letter-spacing: 3px; text-shadow: 2px 2px 4px #000;
            pointer-events: none;
        }

        /* Iframe Video */
        iframe { 
            width: 100%; height: 100%; border: none; 
            position: absolute; z-index: 10; pointer-events: none; 
        }

        /* Efek Semut (Static) */
        #noise-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: url('https://upload.wikimedia.org/wikipedia/commons/5/5a/Static_noise.gif'); 
            z-index: 20; opacity: 0; pointer-events: none;
        }

        /* Kotak Nama (Info Bar) */
        #info-bar { 
            position: absolute; bottom: 50px; left: 50px; 
            background: linear-gradient(90deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0) 100%);
            padding: 20px 60px 20px 25px; 
            opacity: 0; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            z-index: 100; transform: translateX(-50px);
        }
        #info-bar.show { opacity: 1; transform: translateX(0); }
        
        /* Warna Berdasarkan Golongan */
        .digital-accent { border-left: 8px solid #00f2ff; } /* Cyan */
        .analog-accent { border-left: 8px solid #ffaa00; }  /* Orange */

        .golongan { 
            font-size: 0.9rem; font-weight: bold; letter-spacing: 4px; 
            text-transform: uppercase; margin-bottom: 5px;
        }
        #ch-name { margin: 0; font-size: 3.5rem; font-weight: 900; text-transform: uppercase; }

        /* Filter Analog BW */
        .analog-bw { filter: grayscale(100%) contrast(110%) brightness(90%); }
    </style>
</head>
<body onclick="initTV()">

<div id="watermark">CONECTA TV</div>

<div id="tv-screen">
    <div id="noise-overlay"></div>
    <iframe id="main-player" allow="autoplay; fullscreen"></iframe>

    <div id="info-bar">
        <div id="ch-gol" class="golongan">DIGITAL</div>
        <h1 id="ch-name">LOADING...</h1>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = {
        apiKey: "AIzaSyBoS3INezO0UQptcXYNZFbnPbmmf_hU8xc",
        authDomain: "xbook-global26.firebaseapp.com",
        databaseURL: "https://xbook-global26-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "xbook-global26",
        appId: "1:384795261277:web:6a2b05dbea819b4f4590b4"
    };

    const app = initializeApp(config);
    const db = getDatabase(app);
    const player = document.getElementById('main-player');
    const info = document.getElementById('info-bar');
    const noise = document.getElementById('noise-overlay');

    const channelList = [
        { name: "Metro TV", id: "AUE5iHINUIw", type: "digital" },
        { name: "iNews", id: "Kz3FK5FbBz8", type: "analog" },
        { name: "Boomerang", id: "6a23sxk5_vM", type: "digital" },
        { name: "Cartoon TV", id: "U8ZzsbxbYcE", type: "analog" },
        { name: "Tom TV", id: "oV5gVoZQ7xU", type: "analog" }
    ];

    let currentIdx = 0;
    let started = false;
    let aInt, nInt;

    // Klik Layar untuk Mulai (Penting agar suara & remote aktif)
    window.initTV = () => {
        if(started) return;
        started = true;
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        syncFromCloud();
    };

    function syncFromCloud() {
        onValue(ref(db, 'conecta_tv/current_idx'), (snap) => {
            const val = snap.val();
            currentIdx = (val !== null) ? val : 0;
            updateDisplay();
        });
    }

    function updateDisplay() {
        const ch = channelList[currentIdx];
        if(!ch) return;

        // Update Video
        const newUrl = `https://www.youtube.com/embed/${ch.id}?autoplay=1&controls=0&mute=0&rel=0&enablejsapi=1&showinfo=0`;
        if(player.src !== newUrl) player.src = newUrl;

        // Update Info Bar
        document.getElementById('ch-name').innerText = ch.name;
        document.getElementById('ch-gol').innerText = ch.type + " TV";
        
        // Ganti Warna Kotak
        info.className = (ch.type === "digital") ? "digital-accent show" : "analog-accent show";
        
        // Sembunyikan Info setelah 5 detik
        setTimeout(() => info.classList.remove('show'), 5000);

        // Manage Analog Effects
        clearInterval(aInt); clearInterval(nInt);
        player.classList.remove('analog-bw'); noise.style.opacity = 0;
        
        if (ch.type === "analog") {
            aInt = setInterval(() => {
                player.classList.add('analog-bw');
                setTimeout(() => player.classList.remove('analog-bw'), 5000);
            }, 60000);
            
            nInt = setInterval(() => {
                noise.style.opacity = 0.12;
                setTimeout(() => noise.style.opacity = 0, 400);
            }, 5000);
        }
    }

    // Remote PR/CH
    window.addEventListener('keydown', (e) => {
        if(!started) return;
        let next;
        if (e.key === "ArrowUp") {
            next = (currentIdx + 1) % channelList.length;
            update(ref(db, 'conecta_tv'), { current_idx: next });
        } else if (e.key === "ArrowDown") {
            next = (currentIdx - 1 + channelList.length) % channelList.length;
            update(ref(db, 'conecta_tv'), { current_idx: next });
        }
    });
</script>
</body>
</html>
