<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONECTA TV</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; cursor: none; color: #fff; }
        #video-container { width: 100vw; height: 100vh; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        .video-js { width: 100% !important; height: 100% !important; z-index: 1; }

        /* --- Animasi Tanda Seru Bergerak --- */
        #no-signal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; z-index: 10;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .warning-icon {
            font-size: 8rem; color: #ff0000; font-weight: 900;
            animation: bounce-alert 1s infinite alternate; /* Animasi Gerak Membal */
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
        }
        #no-signal-overlay h1 { font-size: 1.5rem; margin-top: 20px; letter-spacing: 2px; color: #ff0000; }

        @keyframes bounce-alert {
            from { transform: scale(1); opacity: 0.7; }
            to { transform: scale(1.2); opacity: 1; }
        }

        /* --- Info & Watermark --- */
        #info-overlay {
            position: absolute; bottom: 8%; left: 5%;
            background: rgba(0,0,0,0.8); padding: 20px 40px; border-left: 6px solid #ff0000;
            opacity: 0; transition: 0.4s; z-index: 20;
        }
        #info-overlay.show { opacity: 1; }
        .brand-watermark { position: absolute; bottom: 15%; left: 25px; color: rgba(255,255,255,0.1); font-weight: bold; z-index: 5; letter-spacing: 3px; }
    </style>
</head>
<body>

<div id="video-container">
    <div class="brand-watermark">CONECTA</div>
    
    <div id="no-signal-overlay">
        <div class="warning-icon">!</div>
        <h1>Koneksi Terputus!</h1>
    </div>

    <video id="tv-player" class="video-js vjs-big-play-centered" preload="auto"></video>

    <div id="info-overlay">
        <p id="ui-ch-num" style="margin:0; color:#ff0000; font-weight:bold;">CH 01</p>
        <h2 id="ui-ch-name" style="margin:0; font-size:3rem;">LOADING...</h2>
    </div>
</div>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
<script>
    // GUNAKAN LINK PUBLIC AGAR BISA TAMPIL (Contoh Link IPTV Github)
    const channels = [
        { name: "RCTI", url: "https://raw.githubusercontent.com/username/repo/main/rcti.m3u8" }, // Ganti dengan link m3u8 hasil grabber/public
        { name: "MNCTV", url: "https://raw.githubusercontent.com/username/repo/main/mnctv.m3u8" },
        { name: "GTV", url: "https://raw.githubusercontent.com/username/repo/main/gtv.m3u8" },
        { name: "RTV", url: "https://raw.githubusercontent.com/username/repo/main/rtv.m3u8" }
    ];

    let currentIdx = 0;
    const player = videojs('tv-player', { autoplay: true, controls: false });
    const signal = document.getElementById('no-signal-overlay');

    function playCH(idx) {
        signal.style.display = "none";
        const ch = channels[idx];
        document.getElementById('ui-ch-name').innerText = ch.name;
        document.getElementById('ui-ch-num').innerText = `CH ${(idx + 1).toString().padStart(2, '0')}`;
        
        document.getElementById('info-overlay').classList.add('show');
        setTimeout(() => document.getElementById('info-overlay').classList.remove('show'), 4000);

        player.src({ type: 'application/x-mpegURL', src: ch.url });
        player.play().catch(() => signal.style.display = "flex");
    }

    // Navigasi Remote PR/CH
    window.addEventListener('keydown', (e) => {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        
        if (e.key === "ChannelUp" || e.key === "ArrowUp") {
            currentIdx = (currentIdx + 1) % channels.length;
            playCH(currentIdx);
        } else if (e.key === "ChannelDown" || e.key === "ArrowDown") {
            currentIdx = (currentIdx - 1 + channels.length) % channels.length;
            playCH(currentIdx);
        }
    });

    player.on('error', () => signal.style.display = "flex");
    playCH(currentIdx);
</script>
</body>
</html>
