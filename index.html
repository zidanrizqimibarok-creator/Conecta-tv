<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>CONECTA T.O V14.2 - ULTRA STABLE</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; cursor: default;
        }
        #tv-screen { width: 100vw; height: 100vh; position: relative; display: none; }
        
        /* Layar Awal (Penting agar PR/CH Jalan) */
        #start-screen {
            position: absolute; width: 100%; height: 100%; background: #111;
            z-index: 999; display: flex; align-items: center; justify-content: center;
            color: white; font-family: sans-serif; cursor: pointer;
        }

        iframe { width: 100%; height: 100%; border: none; position: absolute; z-index: 10; pointer-events: none; }

        #noise-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: url('https://upload.wikimedia.org/wikipedia/commons/5/5a/Static_noise.gif'); 
            z-index: 20; opacity: 0; pointer-events: none;
        }

        #info-bar { 
            position: absolute; bottom: 8%; left: 5%; 
            background: rgba(0,0,0,0.9); padding: 15px 40px; 
            border-left: 10px solid #f00; opacity: 0; transition: 0.5s; 
            z-index: 100; color: #fff; font-family: 'Arial Black', sans-serif; 
        }
        #info-bar.show { opacity: 1; }
        .golongan { color: #ff0; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; }
        .analog-bw { filter: grayscale(100%) contrast(120%); }
    </style>
</head>
<body onclick="startTV()">

<div id="start-screen">
    <h1 style="border: 2px solid white; padding: 20px;">KLIK UNTUK MENYALAKAN TV<br><small style="font-size: 1rem;">(Agar Remote/Keyboard Berfungsi)</small></h1>
</div>

<div id="tv-screen">
    <div id="noise-overlay"></div>
    <iframe id="main-player" allow="autoplay; fullscreen"></iframe>
    <div id="info-bar">
        <div id="ch-gol" class="golongan">DIGITAL TV</div>
        <h1 id="ch-name" style="margin:0; font-size:3rem; text-transform:uppercase;">LOADING...</h1>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = {
        apiKey: "AIzaSyBoS3INezO0UQptcXYNZFbnPbmmf_hU8xc",
        authDomain: "xbook-global26.firebaseapp.com",
        databaseURL: "https://xbook-global26-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "xbook-global26",
        appId: "1:384795261277:web:6a2b05dbea819b4f4590b4"
    };

    const app = initializeApp(config);
    const db = getDatabase(app);
    const player = document.getElementById('main-player');
    const info = document.getElementById('info-bar');
    const noise = document.getElementById('noise-overlay');
    const startScreen = document.getElementById('start-screen');
    const tvScreen = document.getElementById('tv-screen');

    const channelList = [
        { name: "Metro TV", id: "AUE5iHINUIw", type: "digital" },
        { name: "iNews", id: "Kz3FK5FbBz8", type: "analog" },
        { name: "Boomerang", id: "6a23sxk5_vM", type: "digital" },
        { name: "Cartoon TV", id: "U8ZzsbxbYcE", type: "analog" },
        { name: "Tom TV", id: "oV5gVoZQ7xU", type: "analog" }
    ];

    let currentIdx = 0;
    let isStarted = false;
    let analogInterval, noiseInterval;

    window.startTV = () => {
        if(isStarted) return;
        isStarted = true;
        startScreen.style.display = "none";
        tvScreen.style.display = "block";
        document.body.style.cursor = "none";
        if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
        
        // Ambil posisi channel terakhir dari Firebase
        get(ref(db, 'conecta_tv/current_idx')).then((snap) => {
            currentIdx = snap.val() || 0;
            playChannel(currentIdx);
        });
    };

    onValue(ref(db, 'conecta_tv/current_idx'), (snap) => {
        if(!isStarted) return;
        const val = snap.val();
        currentIdx = (val !== null) ? val : 0;
        playChannel(currentIdx);
    });

    function playChannel(idx) {
        const ch = channelList[idx];
        if(!ch) return;
        const newSrc = `https://www.youtube.com/embed/${ch.id}?autoplay=1&controls=0&mute=0&rel=0&enablejsapi=1`;
        if(player.src !== newSrc) player.src = newSrc;
        
        document.getElementById('ch-name').innerText = ch.name;
        document.getElementById('ch-gol').innerText = ch.type + " TV";
        info.classList.add('show');
        setTimeout(() => info.classList.remove('show'), 5000);

        clearInterval(analogInterval); clearInterval(noiseInterval);
        player.classList.remove('analog-bw'); noise.style.opacity = 0;
        if (ch.type === "analog") startAnalogEffects();
    }

    function startAnalogEffects() {
        analogInterval = setInterval(() => {
            player.classList.add('analog-bw');
            setTimeout(() => player.classList.remove('analog-bw'), 5000);
        }, 60000);
        noiseInterval = setInterval(() => {
            noise.style.opacity = 0.15;
            setTimeout(() => noise.style.opacity = 0, 500);
        }, 5000);
    }

    async function changeCH(delta) {
        let nextIdx = (currentIdx + delta + channelList.length) % channelList.length;
        update(ref(db, 'conecta_tv'), { current_idx: nextIdx });
    }

    window.addEventListener('keydown', (e) => {
        if(!isStarted) return;
        if (e.key === "ArrowUp") changeCH(1);
        if (e.key === "ArrowDown") changeCH(-1);
    });
</script>
</body>
</html>
