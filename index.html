<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONECTA T.O V6 - AUTO SUB</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; cursor: none; color: #fff; font-family: 'Arial Black', sans-serif; }
        
        /* Booting Mewah */
        #booting {
            position: absolute; width: 100%; height: 100%; background: #000;
            z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .boot-text { font-size: 3.5rem; letter-spacing: 20px; font-weight: 900; animation: pulse 1.5s infinite; }
        .loading-bar { width: 200px; height: 4px; background: #333; margin-top: 20px; position: relative; overflow: hidden; }
        .loading-bar::after { content: ''; position: absolute; width: 50%; height: 100%; background: #ff0000; animation: load 1.5s infinite; }

        /* Iframe */
        iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; }

        /* Dashboard */
        #dash {
            position: absolute; bottom: 5%; left: 3%; right: 3%;
            background: rgba(0,0,0,0.9); border-left: 15px solid #ff0000;
            padding: 25px 45px; transform: translateY(250%); transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 500; backdrop-filter: blur(10px);
        }
        #dash.show { transform: translateY(0); }
        .ch-name { font-size: 4rem; margin: 0; text-transform: uppercase; line-height: 1; }
        .tag { padding: 5px 15px; font-size: 0.9rem; border-radius: 5px; margin-right: 8px; font-weight: bold; display: inline-block; }
        .t-live { background: #ff0000; animation: blink 1s infinite; }
        .t-sub { background: #28a745; border: 1px solid #fff; }

        @keyframes pulse { 0%, 100% { opacity: 1; text-shadow: 0 0 20px #ff0000; } 50% { opacity: 0.4; } }
        @keyframes load { from { left: -50%; } to { left: 100%; } }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div id="booting">
    <div class="boot-text">CONECTA T.O</div>
    <div class="loading-bar"></div>
</div>

<iframe id="tv-frame" allow="autoplay; fullscreen; speaker"></iframe>

<div id="dash">
    <div style="margin-bottom: 8px;">
        <span class="tag t-live">● LIVE</span>
        <span class="tag" style="background: #0056b3;" id="ch-loc">INDONESIA</span>
        <span class="tag t-sub">AUTO-SUB INDONESIA [AI]</span>
    </div>
    <h1 class="ch-name" id="ch-title">LOADING...</h1>
    <p id="ch-desc" style="color: #aaa; margin: 8px 0 0 0; font-size: 1.2rem;">Bahasa: Indonesia</p>
</div>

<script>
    const channels = [
        { name: "Upin Ipin Live", id: "live_stream?channel=UCp0C_O9vV3-O3_Vn2p8mC9g", loc: "MALAYSIA", lang: "Melayu" },
        { name: "Disney Kids", id: "P2v6i_L_S_0", loc: "USA", lang: "English" },
        { name: "Marvel TV", id: "rS8_6t6SIsE", loc: "USA", lang: "English" },
        { name: "Boomerang TV", id: "65IsA_SshL4", loc: "USA", lang: "English" },
        { name: "Disney Channel", id: "w7pYhp496tg", loc: "USA", lang: "English" },
        { name: "TVRI World", id: "eE5E8MXQpqc", loc: "GLOBAL", lang: "English" },
        { name: "TVRI Sport", id: "6a23sxk5_vM", loc: "INDONESIA", lang: "Indonesia" },
        { name: "Kompas TV", id: "2MC5ltEDu7w", loc: "INDONESIA", lang: "Indonesia" },
        { name: "CNN Indonesia", id: "YbQwgoMoztA", loc: "INDONESIA", lang: "Indonesia" },
        { name: "Al Jazeera", id: "_HviSyC7zSU", loc: "QATAR", lang: "English" }
    ];

    let current = 0;
    const frame = document.getElementById('tv-frame');
    const dash = document.getElementById('dash');

    function play(idx) {
        const c = channels[idx];
        document.getElementById('ch-title').innerText = c.name;
        document.getElementById('ch-loc').innerText = c.loc;
        document.getElementById('ch-desc').innerText = `Bahasa: ${c.lang}`;
        
        // PENTING: Kode paksa subtitle hl=id (bahasa interface), cc_lang_pref=id (bahasa teks), cc_load_policy=1 (selalu ON)
        const vidId = c.id;
        frame.src = `https://www.youtube.com/embed/${vidId}?autoplay=1&controls=0&cc_load_policy=1&cc_lang_pref=id&hl=id&rel=0`;

        dash.classList.add('show');
        setTimeout(() => dash.classList.remove('show'), 6000);
    }

    window.onload = () => {
        setTimeout(() => {
            document.getElementById('booting').style.display = "none";
            play(current);
        }, 4000);
    };

    window.addEventListener('keydown', (e) => {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
        if (e.key === "ArrowUp" || e.key === "ChannelUp" || e.keyCode === 427) {
            current = (current + 1) % channels.length; play(current);
        } else if (e.key === "ArrowDown" || e.key === "ChannelDown" || e.keyCode === 428) {
            current = (current - 1 + channels.length) % channels.length; play(current);
        }
    });
</script>
</body>
</html>
