<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONECTA TV</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; cursor: none; }
        
        /* Iframe Khusus agar Mark YouTube & Elemen Web Hilang */
        .tv-frame {
            width: 100vw; height: 100vh; border: none;
            position: absolute; top: 0; left: 0;
            display: none; background: #000;
        }
        .active { display: block !important; }

        /* Animasi Tanda Seru (!) Merah Berdenyut */
        #error-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .bang-icon {
            font-size: 15rem; color: #ff0000; font-weight: 900;
            animation: pulse-bang 0.7s infinite alternate;
        }
        @keyframes pulse-bang { from { transform: scale(1); } to { transform: scale(1.2); opacity: 0.6; } }

        /* Info Bar & Watermark Conecta */
        #info-bar {
            position: absolute; bottom: 8%; left: 5%;
            background: rgba(0,0,0,0.95); padding: 15px 40px;
            border-left: 10px solid #ff0000; opacity: 0; transition: 0.4s; z-index: 110;
        }
        #info-bar.show { opacity: 1; }
        .watermark { position: absolute; bottom: 15%; left: 30px; color: rgba(255,255,255,0.1); font-weight: bold; z-index: 50; letter-spacing: 5px; }
    </style>
</head>
<body>

<div id="tv-container">
    <div class="watermark">CONECTA</div>

    <div id="error-screen">
        <div class="bang-icon">!</div>
        <h1 style="color: #ff0000; letter-spacing: 5px;">KONEKSI TERPUTUS!</h1>
    </div>

    <iframe id="main-frame" class="tv-frame active" allow="autoplay; fullscreen"></iframe>

    <div id="info-bar">
        <p id="ch-num" style="margin:0; color:#ff0000; font-weight:bold;">CH 01</p>
        <h2 id="ch-name" style="margin:0; font-size:4rem; text-transform:uppercase;">LOADING...</h2>
    </div>
</div>

<script>
    const channels = [
        // YouTube iNews dengan modestbranding=1 untuk sembunyikan logo
        { name: "iNews TV", url: "https://www.youtube.com/embed/Kz3FK5FbBz8?autoplay=1&modestbranding=1&rel=0&showinfo=0&iv_load_policy=3&controls=0" },
        { name: "RCTI", url: "https://m.rctiplus.com/tv/rcti" },
        { name: "GTV", url: "https://m.rctiplus.com/tv/gtv" },
        { name: "MNCTV", url: "https://m.rctiplus.com/tv/mnctv" }
    ];

    let currentIdx = 0;
    const frame = document.getElementById('main-frame');
    const info = document.getElementById('info-bar');
    const err = document.getElementById('error-screen');

    function loadCH(idx) {
        err.style.display = "none";
        const target = channels[idx];
        
        // Info Pop-up
        document.getElementById('ch-num').innerText = `CH ${(idx + 1).toString().padStart(2, '0')}`;
        document.getElementById('ch-name').innerText = target.name;
        info.classList.add('show');
        setTimeout(() => info.classList.remove('show'), 5000);

        // Load Link
        frame.src = target.url;
    }

    // Fungsi Paksa Landscape & Fullscreen
    function autoLandscape() {
        const el = document.documentElement;
        if (el.requestFullscreen) el.requestFullscreen();
        
        // Kunci layar ke Landscape (Jika di Mobile/Tablet)
        if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(() => {});
        }
    }

    // Logika Tombol PR/CH dari Remote
    window.addEventListener('keydown', (e) => {
        autoLandscape(); // Langsung landscape saat tombol dipencet

        // Tombol Atas (PR/CH Up)
        if (e.key === "ArrowUp" || e.key === "ChannelUp" || e.keyCode === 427) {
            currentIdx = (currentIdx + 1) % channels.length;
            loadCH(currentIdx);
        } 
        // Tombol Bawah (PR/CH Down)
        else if (e.key === "ArrowDown" || e.key === "ChannelDown" || e.keyCode === 428) {
            currentIdx = (currentIdx - 1 + channels.length) % channels.length;
            loadCH(currentIdx);
        }
    });

    // Cek Sinyal Internet
    window.addEventListener('offline', () => err.style.display = "flex");
    window.addEventListener('online', () => loadCH(currentIdx));

    loadCH(currentIdx);
</script>
</body>
</html>
