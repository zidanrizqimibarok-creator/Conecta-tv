<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>CONECTA T.O V12 - FIXED</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; cursor: none; }
        #tv-screen { width: 100vw; height: 100vh; position: relative; }
        iframe { width: 100%; height: 100%; border: none; position: absolute; z-index: 10; }
        
        /* Efek Semut & No Signal */
        #static { position: absolute; width: 100%; height: 100%; background: url('https://upload.wikimedia.org/wikipedia/commons/5/5a/Static_noise.gif'); z-index: 20; display: none; }
        #no-signal { position: absolute; width: 100%; height: 100%; background: #000; z-index: 30; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .bang { font-size: 15rem; color: #f00; font-weight: 900; animation: bounce 0.5s infinite alternate; }

        /* Kotak Info */
        #info-bar { position: absolute; bottom: 8%; left: 5%; background: rgba(0,0,0,0.9); padding: 15px 40px; border-left: 10px solid #f00; opacity: 0; transition: 0.5s; z-index: 100; font-family: sans-serif; color: #fff; }
        #info-bar.show { opacity: 1; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }
    </style>
</head>
<body>

<div id="tv-screen">
    <div id="static"></div>
    <div id="no-signal">
        <div class="bang">!</div>
        <h1 id="err-text" style="color:#f00; font-family:sans-serif;">NO SIGNAL</h1>
    </div>
    
    <iframe id="player" allow="autoplay; fullscreen"></iframe>

    <div id="info-bar">
        <div id="type-txt" style="color:#ff0; font-size:0.8rem;">DIGITAL TV</div>
        <h1 id="name-txt" style="margin:0; font-size:3rem; text-transform:uppercase;">LOADING...</h1>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = {
        apiKey: "AIzaSyBoS3INezO0UQptcXYNZFbnPbmmf_hU8xc",
        authDomain: "xbook-global26.firebaseapp.com",
        databaseURL: "https://xbook-global26-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "xbook-global26",
        appId: "1:384795261277:web:6a2b05dbea819b4f4590b4"
    };

    const db = getDatabase(initializeApp(config));
    const player = document.getElementById('player');
    const info = document.getElementById('info-bar');
    let channels = [];
    let currentIdx = 0;

    onValue(ref(db, 'conecta_tv'), (snap) => {
        const data = snap.val();
        if(!data || !data.channels) return;

        channels = data.channels;
        currentIdx = data.current_idx || 0;
        const ch = channels[currentIdx];
        const isOff = data.power === "OFF" || (data.global_analog_off && ch.type === 'analog');

        if (isOff) {
            player.src = "";
            if (ch.type === 'analog') {
                document.getElementById('static').style.display = "block";
                document.getElementById('no-signal').style.display = "flex";
                document.getElementById('err-text').innerText = "ANALOG NOT SUPPORT";
                document.querySelector('.bang').style.display = "none";
            } else {
                document.getElementById('static').style.display = "none";
                document.getElementById('no-signal').style.display = "flex";
                document.getElementById('err-text').innerText = "NO SIGNAL";
                document.querySelector('.bang').style.display = "block";
            }
        } else {
            document.getElementById('static').style.display = "none";
            document.getElementById('no-signal').style.display = "none";
            // FIX: Tambahkan parameter origin dan enablejsapi agar video tidak blank
            player.src = `https://www.youtube.com/embed/${ch.id}?autoplay=1&controls=0&enablejsapi=1&origin=${window.location.origin}&widgetid=1`;
            
            document.getElementById('name-txt').innerText = ch.name;
            document.getElementById('type-txt').innerText = ch.type.toUpperCase() + " TV";
            info.classList.add('show');
            setTimeout(() => info.classList.remove('show'), 5000);
        }
    });

    window.addEventListener('keydown', (e) => {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        if (e.key === "ArrowUp") update(ref(db, 'conecta_tv'), { current_idx: (currentIdx + 1) % channels.length, power: "ON" });
        if (e.key === "ArrowDown") update(ref(db, 'conecta_tv'), { current_idx: (currentIdx - 1 + channels.length) % channels.length, power: "ON" });
    });
</script>
</body>
</html>
