<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEII IPTV - Digital OS</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; cursor: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        
        /* Video Layer */
        #video-wrapper { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Overlay Info Channel */
        #info-box { 
            position: absolute; bottom: 50px; left: 50px; 
            background: rgba(0, 0, 0, 0.8); color: white; padding: 20px 40px;
            border-left: 8px solid #00d1b2; border-radius: 4px;
            opacity: 0; transition: opacity 0.5s; z-index: 10;
        }
        #info-box.show { opacity: 1; }
        #ch-number { font-size: 50px; font-weight: bold; display: block; }
        #ch-name { font-size: 24px; color: #ccc; }
        #ch-type { font-size: 14px; background: #00d1b2; color: #000; padding: 2px 8px; border-radius: 3px; font-weight: bold; margin-top: 5px; display: inline-block; }

        /* No Signal UI */
        #no-signal { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndXN3bm53amR4eG54eHh4eHh4eHh4eHh4eHh4eHh4eHh4JnB0PWEmZXA9djFfaW50ZXJuYWxfZ2lmX2J5X2lkJmN0PWc/3o7TKMGpxvfXGxGvS0/giphy.gif') center/cover;
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 5;
        }
        #no-signal h1 { color: white; text-shadow: 2px 2px #000; font-size: 3rem; }

        /* Sidebar Channel List */
        #sidebar {
            position: absolute; right: -300px; top: 0; width: 300px; height: 100%;
            background: rgba(20, 20, 20, 0.95); color: white; transition: 0.3s; z-index: 20;
            padding: 20px; overflow-y: auto; border-left: 1px solid #444;
        }
        #sidebar.open { right: 0; }
        .ch-item { padding: 10px; border-bottom: 1px solid #333; cursor: pointer; font-size: 14px; }
        .ch-item:hover { background: #00d1b2; color: #000; }

        /* Navigation Buttons (Desktop Helper) */
        .nav-helper { position: absolute; top: 10px; left: 10px; color: rgba(255,255,255,0.3); font-size: 10px; z-index: 100; }
    </style>
</head>
<body onclick="enableFullscreen()">

    <div class="nav-helper">Tekan [UP/DOWN] Ganti Channel | [L] Daftar Channel | [0-9] Angka Shortcut</div>

    <div id="video-wrapper">
        <div id="no-signal"><h1>TIDAK ADA SINYAL</h1></div>
        
        <video id="main-video"></video>

        <div id="info-box">
            <span id="ch-number">01</span>
            <div id="ch-name">MEMUAT...</div>
            <div id="ch-type">DIGITAL TV</div>
        </div>
    </div>

    <div id="sidebar">
        <h3 style="margin-bottom:15px; border-bottom:2px solid #00d1b2">DAFTAR SALURAN</h3>
        <div id="list-content"></div>
    </div>

    <script>
        const video = document.getElementById('main-video');
        const infoBox = document.getElementById('info-box');
        const noSignal = document.getElementById('no-signal');
        const sidebar = document.getElementById('sidebar');
        const listContent = document.getElementById('list-content');
        
        let channels = [];
        let currentIndex = 0;
        let infoTimeout;
        const hls = new Hls();

        // Ambil Data M3U
        fetch('https://iptv-org.github.io/iptv/languages/ind.m3u')
            .then(res => res.text())
            .then(data => {
                const lines = data.split('\n');
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF')) {
                        const name = lines[i].split(',')[1].trim();
                        const url = lines[i + 1].trim();
                        channels.push({ name, url });
                        
                        // Isi Sidebar
                        const item = document.createElement('div');
                        item.className = 'ch-item';
                        item.innerText = `${channels.length}. ${name}`;
                        item.onclick = () => { playChannel(channels.length - 1); toggleSidebar(); };
                        listContent.appendChild(item);
                    }
                }
                playChannel(0);
            });

        function playChannel(index) {
            if (index < 0) index = channels.length - 1;
            if (index >= channels.length) index = 0;
            
            currentIndex = index;
            const ch = channels[index];
            
            // UI Update
            noSignal.style.display = 'none';
            document.getElementById('ch-number').innerText = (index + 1).toString().padStart(2, '0');
            document.getElementById('ch-name').innerText = ch.name;
            showInfo();

            // Logic Play
            if (Hls.isSupported()) {
                hls.loadSource(ch.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            }

            // Error Handling (No Signal)
            hls.on(Hls.Events.ERROR, () => { noSignal.style.display = 'flex'; });
            video.onerror = () => { noSignal.style.display = 'flex'; };
        }

        function showInfo() {
            infoBox.classList.add('show');
            clearTimeout(infoTimeout);
            infoTimeout = setTimeout(() => infoBox.classList.remove('show'), 4000);
        }

        function toggleSidebar() { sidebar.classList.toggle('open'); }

        function enableFullscreen() {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
        }

        // Kontrol Keyboard (Remote Style)
        let numBuffer = "";
        window.addEventListener('keydown', (e) => {
            if (e.key === "ArrowUp") playChannel(currentIndex - 1);
            if (e.key === "ArrowDown") playChannel(currentIndex + 1);
            if (e.key === "l" || e.key === "L") toggleSidebar();
            
            // Shortcut Nomor
            if (/[0-9]/.test(e.key)) {
                numBuffer += e.key;
                clearTimeout(window.numTimer);
                window.numTimer = setTimeout(() => {
                    const target = parseInt(numBuffer) - 1;
                    if (channels[target]) playChannel(target);
                    numBuffer = "";
                }, 1000);
            }
        });
    </script>
</body>
</html>
