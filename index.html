<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONECTA T.O V24 - ULTRA IPTV</title>
    <link rel="stylesheet" href="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.css" type="text/css"/>
    <script src="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; color: #fff; font-family: 'Arial Black', sans-serif; }
        #booting { position: absolute; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .boot-text { font-size: 3rem; letter-spacing: 15px; animation: flash 1.5s infinite; }
        
        #tv-container { width: 100%; height: 100%; position: relative; }
        /* Memaksa video menutupi seluruh layar */
        .fluid_video_wrapper { width: 100% !important; height: 100% !important; }

        #no-signal-box {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 900; display: none;
            align-items: center; justify-content: center;
        }
        .error-msg { padding: 20px 50px; border: 4px solid #fff; font-size: 2.5rem; background: #000; }

        #dash {
            position: absolute; bottom: 5%; left: 3%; right: 3%;
            background: rgba(0,0,0,0.9); border-left: 12px solid #ff0000;
            padding: 20px 40px; transform: translateY(200%); transition: 0.5s;
            z-index: 950; backdrop-filter: blur(8px);
        }
        #dash.show { transform: translateY(0); }
        .ch-name { font-size: 3.5rem; margin: 0; text-transform: uppercase; line-height: 1; }
        .tag { padding: 5px 12px; font-size: 0.8rem; border-radius: 4px; margin-right: 5px; font-weight: bold; }
        .uhf-code { color: #00f2ff; font-family: monospace; font-size: 1.1rem; margin-top: 10px; display: block; }
        
        .analog-mode { filter: grayscale(100%) contrast(1.1); }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>

<div id="booting"><div class="boot-text">CONECTA T.O</div></div>

<div id="tv-container">
    <div id="no-signal-box"><div class="error-msg">! NO SIGNAL</div></div>
    <video id="video-vlc"></video>
</div>

<div id="dash">
    <div style="margin-bottom: 5px;">
        <span class="tag" id="mode-text" style="background:#ff0000">● LIVE</span>
        <span id="ch-loc" class="tag" style="background:#0056b3">INDONESIA</span>
    </div>
    <h1 class="ch-name" id="ch-title">MENUNGGU SINYAL...</h1>
    <span class="uhf-code" id="ch-uhf">UHF: -- | TF: ---.-- KHZ</span>
</div>

<script>
    // Koleksi Lengkap dari Link IPTV Indonesia
    const channels = [
        { name: "SCTV", url: "https://video.liputan6.com/sctv/live/playlist.m3u8", type: "D", uhf: "30", tf: "546.00" },
        { name: "INDOSIAR", url: "https://video.liputan6.com/indosiar/live/playlist.m3u8", type: "A", uhf: "24", tf: "498.25" },
        { name: "TRANS TV", url: "https://idp.mivo.com/mivo/transtv/playlist.m3u8", type: "D", uhf: "40", tf: "626.00" },
        { name: "TRANS 7", url: "https://idp.mivo.com/mivo/trans7/playlist.m3u8", type: "A", uhf: "42", tf: "642.25" },
        { name: "METRO TV", url: "https://live.metrotvnews.com/hls/metrotv.m3u8", type: "D", uhf: "32", tf: "562.00" },
        { name: "KOMPAS TV", url: "https://live.kompas.tv/hls/live.m3u8", type: "A", uhf: "25", tf: "506.25" },
        { name: "ANTV", url: "https://idp.mivo.com/mivo/antv/playlist.m3u8", type: "D", uhf: "26", tf: "514.00" },
        { name: "NET TV", url: "https://netmedia.akamaized.net/hls/live/2012480/net-tv/master.m3u8", type: "A", uhf: "34", tf: "578.25" }
    ];

    let current = 0;
    let signalTimer;
    let videoInstance;
    const dash = document.getElementById('dash');
    const nosignal = document.getElementById('no-signal-box');

    function initPlayer() {
        videoInstance = fluidPlayer('video-vlc', {
            layoutControls: {
                autoPlay: true,
                mute: false,
                allowTheater: false,
                playPauseAnimation: false,
                fillControlBar: true,
                controlBar: { autoHide: true }
            }
        });
    }

    function tune(idx) {
        clearInterval(signalTimer);
        nosignal.style.display = "none";
        document.getElementById('booting').style.display = "none";
        
        const c = channels[idx];
        document.getElementById('ch-title').innerText = c.name;
        document.getElementById('ch-uhf').innerText = `UHF: ${c.uhf} | TF: ${c.tf} KHZ`;
        
        const modeTag = document.getElementById('mode-text');
        const vTag = document.getElementById('video-vlc');

        if(c.type === "A") {
            modeTag.innerText = "● ANALOG";
            modeTag.style.background = "#555";
            vTag.classList.add("analog-mode");
            startDrop();
        } else {
            modeTag.innerText = "● LIVE";
            modeTag.style.background = "#ff0000";
            vTag.classList.remove("analog-mode");
        }

        // Ganti Source Video
        vTag.src = c.url;
        videoInstance.play();

        dash.classList.add('show');
        setTimeout(() => dash.classList.remove('show'), 5000);
    }

    function startDrop() {
        signalTimer = setInterval(() => {
            nosignal.style.display = "flex";
            const v = document.getElementById('video-vlc');
            v.muted = true;
            setTimeout(() => { 
                nosignal.style.display = "none"; 
                v.muted = false;
            }, 1500);
        }, 10000);
    }

    // Jalankan Player saat pertama kali dimuat
    window.onload = initPlayer;

    // --- WILAYAH SAKRAL PR/CH (V6) ---
    window.addEventListener('keydown', (e) => {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {});
        }

        if (e.key === "ArrowUp" || e.keyCode === 38 || e.keyCode === 427) {
            current = (current + 1) % channels.length;
            tune(current);
        } else if (e.key === "ArrowDown" || e.keyCode === 40 || e.keyCode === 428) {
            current = (current - 1 + channels.length) % channels.length;
            tune(current);
        }
    });
</script>
</body>
</html>
