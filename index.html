<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Digital TV OS - Optimized for Smart TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.10"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; overflow: hidden; }
        body { background: #000; font-family: sans-serif; cursor: none; color: white; }
        
        #tv-screen { position: relative; width: 100vw; height: 100vh; background: #000; }
        /* Pastikan video memenuhi layar TV */
        video { width: 100%; height: 100%; background: #000; object-fit: contain; }

        /* Layar No Signal - Dibuat Statis seperti TV analog/digital asli */
        #no-signal { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #00008b; display: none; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 5;
        }
        .msg-box { border: 5px solid white; padding: 20px 40px; text-align: center; }

        /* OSD (On Screen Display) */
        #osd { 
            position: absolute; bottom: 10%; left: 5%; 
            background: rgba(0, 0, 0, 0.85); padding: 20px; 
            border-left: 12px solid #00fbff; transition: 0.5s; 
            opacity: 0; z-index: 10; min-width: 350px;
        }
        #osd.active { opacity: 1; }
        #osd h1 { font-size: 5rem; margin: 0; line-height: 1; }
        #osd .ch-name { font-size: 1.8rem; font-weight: bold; }

        /* Daftar Saluran Hidden Menu */
        #side-menu {
            position: absolute; left: 0; top: 0; width: 30% ; height: 100%;
            background: rgba(15, 15, 15, 0.95); transform: translateX(-100%);
            transition: 0.3s; z-index: 20; border-right: 2px solid #00fbff;
        }
        #side-menu.open { transform: translateX(0); }
        .list-item { padding: 15px; border-bottom: 1px solid #333; font-size: 1.2rem; }
        .list-item.active { background: #00fbff; color: #000; }

        #num-indicator {
            position: absolute; top: 5%; right: 5%; font-size: 6rem;
            color: #00fbff; font-weight: bold; z-index: 30;
        }
    </style>
</head>
<body onclick="startTV()">

    <div id="tv-screen">
        <div id="num-indicator"></div>

        <div id="no-signal">
            <div class="msg-box">
                <h1>TIDAK ADA SINYAL</h1>
                <p>E601 - KONEKSI GAGAL</p>
            </div>
        </div>

        <video id="video-player" playsinline autoplay></video>

        <div id="osd">
            <h1 id="osd-num">01</h1>
            <div class="ch-name" id="osd-name">MENCARI SALURAN...</div>
            <div style="color: #00fbff; font-weight: bold; margin-top: 5px;">DIGITAL DTV</div>
        </div>

        <div id="side-menu">
            <div style="padding: 20px; background: #00fbff; color: #000; font-weight: bold;">DAFTAR PROGRAM</div>
            <div id="channel-container" style="overflow-y: auto; height: 90%;"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video-player');
        const osd = document.getElementById('osd');
        const sideMenu = document.getElementById('side-menu');
        const noSignal = document.getElementById('no-signal');
        
        let channels = [];
        let currentIndex = 0;
        let lastKeyTime = 0;
        let lastKey = "";
        let numBuffer = "";
        let hls = new Hls({
            // Setting khusus agar lebih ringan di CPU TV
            enableWorker: true,
            lowLatencyMode: true,
            backBufferLength: 60
        });

        // Load Playlist (Gunakan Proxy jika tetap blank di TV)
        // Link github.io terkadang kena blokir CORS di browser TV tertentu
        fetch('https://iptv-org.github.io/iptv/languages/ind.m3u')
            .then(res => res.text())
            .then(data => {
                const lines = data.split('\n');
                let idCounter = 1;
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF')) {
                        const name = lines[i].split(',')[1].trim();
                        const url = lines[i+1]?.trim();
                        if(url && url.startsWith('http')) {
                            channels.push({ id: idCounter++, name, url });
                        }
                    }
                }
                buildMenu();
                playChannel(0);
            }).catch(() => { noSignal.style.display = 'flex'; });

        function buildMenu() {
            const container = document.getElementById('channel-container');
            channels.forEach((ch, idx) => {
                const el = document.createElement('div');
                el.className = 'list-item';
                el.innerText = `${ch.id}. ${ch.name}`;
                el.onclick = () => { playChannel(idx); sideMenu.classList.remove('open'); };
                container.appendChild(el);
            });
        }

        function playChannel(index) {
            if (!channels[index]) return;
            currentIndex = index;
            const ch = channels[index];
            
            noSignal.style.display = 'none';
            document.getElementById('osd-num').innerText = ch.id.toString().padStart(2, '0');
            document.getElementById('osd-name').innerText = ch.name;
            
            osd.classList.add('active');
            setTimeout(() => osd.classList.remove('active'), 4000);

            // Coba putar dengan HLS.js
            if (Hls.isSupported()) {
                hls.destroy(); // Bersihkan sesi sebelumnya
                hls = new Hls();
                hls.loadSource(ch.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
                
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) noSignal.style.display = 'flex';
                });
            } 
            // Fallback untuk Smart TV yang punya native player (seperti Samsung/LG)
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = ch.url;
                video.play();
            }
        }

        // Shortcut: ATAS lalu BAWAH cepat untuk Menu
        window.addEventListener('keydown', (e) => {
            const now = Date.now();
            
            if (lastKey === "ArrowUp" && e.key === "ArrowDown" && (now - lastKeyTime < 500)) {
                sideMenu.classList.toggle('open');
            }

            if (e.key === "ArrowUp") playChannel(currentIndex - 1);
            if (e.key === "ArrowDown") playChannel(currentIndex + 1);

            // Shortcut Angka
            if (/[0-9]/.test(e.key)) {
                numBuffer += e.key;
                document.getElementById('num-indicator').innerText = numBuffer;
                clearTimeout(window.t);
                window.t = setTimeout(() => {
                    const find = channels.findIndex(c => c.id == numBuffer);
                    if (find !== -1) playChannel(find);
                    numBuffer = "";
                    document.getElementById('num-indicator').innerText = "";
                }, 1500);
            }

            lastKey = e.key;
            lastKeyTime = now;
        });

        function startTV() {
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            video.play();
        }
    </script>
</body>
</html>
