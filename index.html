<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>CONECTA T.O - TV SCREEN</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; color: #fff; font-family: sans-serif; }
        #tv-screen { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* Layar Putus Koneksi (!) */
        #kill-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 1000; display: none; 
            flex-direction: column; align-items: center; justify-content: center; 
        }
        .bang { font-size: 15rem; color: #ff0000; animation: bounce 0.5s infinite alternate; font-weight: 900; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }

        /* Dashboard */
        #dash {
            position: absolute; bottom: 5%; left: 3%; background: rgba(0,0,0,0.9);
            border-left: 10px solid #f00; padding: 20px; transition: 0.5s; transform: translateY(200%);
        }
        #dash.show { transform: translateY(0); }
    </style>
</head>
<body>

<div id="tv-screen">
    <div id="kill-screen"><div class="bang">!</div><h1>KONEKSI DIPUTUS PUSAT</h1></div>
    <iframe id="main-player" allow="autoplay; fullscreen"></iframe>
    <div id="dash">
        <h1 id="ch-name" style="margin:0; font-size:3rem; text-transform:uppercase;">OFFLINE</h1>
        <p id="ch-meta" style="color:#f00; font-weight:bold;">SISTEM SIAP</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBoS3INezO0UQptcXYNZFbnPbmmf_hU8xc",
        authDomain: "xbook-global26.firebaseapp.com",
        databaseURL: "https://xbook-global26-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "xbook-global26",
        storageBucket: "xbook-global26.firebasestorage.app",
        messagingSenderId: "384795261277",
        appId: "1:384795261277:web:6a2b05dbea819b4f4590b4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const channels = [
        { name: "Upin Ipin Live", id: "live_stream?channel=UCp0C_O9vV3-O3_Vn2p8mC9g" },
        { name: "Disney Kids", id: "P2v6i_L_S_0" },
        { name: "Marvel TV", id: "rS8_6t6SIsE" },
        { name: "Boomerang TV", id: "65IsA_SshL4" },
        { name: "Disney Channel", id: "w7pYhp496tg" },
        { name: "TVRI World", id: "eE5E8MXQpqc" },
        { name: "TVRI Sport", id: "6a23sxk5_vM" },
        { name: "Kompas TV", id: "2MC5ltEDu7w" },
        { name: "CNN Indonesia", id: "YbQwgoMoztA" },
        { name: "Al Jazeera", id: "_HviSyC7zSU" }
    ];

    const frame = document.getElementById('main-player');
    const kill = document.getElementById('kill-screen');
    const dash = document.getElementById('dash');

    // Mendengarkan perubahan dari Remote Center
    onValue(ref(db, 'conecta_status'), (snapshot) => {
        const data = snapshot.val();
        if(!data) return;

        // Cek Sakelar YouTube (Kill Switch)
        if (data.connection === "OFF") {
            kill.style.display = "flex";
            frame.src = "";
        } else {
            kill.style.display = "none";
            const ch = channels[data.current_ch];
            frame.src = `https://www.youtube.com/embed/${ch.id}?autoplay=1&controls=0&cc_load_policy=1&cc_lang_pref=id&hl=id`;
            
            document.getElementById('ch-name').innerText = ch.name;
            dash.classList.add('show');
            setTimeout(() => dash.classList.remove('show'), 5000);
        }
    });
</script>
</body>
</html>
