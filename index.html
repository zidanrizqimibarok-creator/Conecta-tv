<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONECTA TV - Premium Broadcast</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; cursor: none; }
        
        #video-container { width: 100vw; height: 100vh; position: relative; background: #000; }
        .video-js { width: 100% !important; height: 100% !important; }

        /* Noise Sinyal Teracak */
        #no-signal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://media.giphy.com/media/oEI9uWUicG3vA3nkpu/giphy.gif') center/cover;
            display: none; z-index: 10; flex-direction: column; align-items: center; justify-content: center;
        }
        #no-signal h1 { color: white; background: rgba(255,0,0,0.7); padding: 10px 20px; font-size: 1.5rem; }

        /* Channel Info Overlay */
        #info-overlay {
            position: absolute; bottom: 8%; left: 5%;
            background: linear-gradient(90deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            color: #fff; padding: 20px 50px; border-left: 8px solid #00d4ff;
            opacity: 0; transition: opacity 0.4s ease; z-index: 20;
        }
        #info-overlay h2 { margin: 0; font-size: 3rem; font-weight: 800; letter-spacing: -1px; }
        #info-overlay p { margin: 0; font-size: 1.2rem; color: #00d4ff; font-weight: bold; }

        /* Watermark */
        .brand { position: absolute; top: 30px; right: 40px; color: rgba(255,255,255,0.3); font-weight: bold; font-size: 1.2rem; z-index: 5; }
    </style>
</head>
<body>

<div id="video-container">
    <div class="brand">CONECTA TV</div>
    
    <div id="no-signal">
        <h1>SINYAL TERACAK</h1>
    </div>

    <video id="main-player" class="video-js vjs-big-play-centered" preload="auto"></video>

    <div id="info-overlay">
        <p id="ui-ch-num">CHANNEL 01</p>
        <h2 id="ui-ch-name">LOADING...</h2>
    </div>
</div>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
<script>
    // Database Channel (Ganti URL dengan link .m3u8 aktif dari ip-tv.app)
    const playlist = [
        { name: "RCTI", url: "https://p.rctiplus.id/hls/rcti/v1/master.m3u8" },
        { name: "MNCTV", url: "https://p.rctiplus.id/hls/mnctv/v1/master.m3u8" },
        { name: "GTV", url: "https://p.rctiplus.id/hls/gtv/v1/master.m3u8" },
        { name: "iNews", url: "https://p.rctiplus.id/hls/inews/v1/master.m3u8" },
        { name: "SCTV", url: "https://example.com/sctv.m3u8" },
        { name: "Indosiar", url: "https://example.com/indosiar.m3u8" },
        { name: "Trans TV", url: "https://example.com/transtv.m3u8" },
        { name: "Trans 7", url: "https://example.com/trans7.m3u8" },
        { name: "Metro TV", url: "https://example.com/metrotv.m3u8" },
        { name: "TVOne", url: "https://example.com/tvone.m3u8" },
        { name: "Kompas TV", url: "https://example.com/kompastv.m3u8" },
        { name: "NET TV", url: "https://example.com/nettv.m3u8" },
        { name: "TVRI Nasional", url: "https://example.com/tvri.m3u8" },
        { name: "ANTV", url: "https://example.com/antv.m3u8" }
    ];

    let currentIdx = 0;
    const player = videojs('main-player', {
        autoplay: true,
        controls: false, // Benar-benar seperti TV, kontrol bar hilang
        fluid: false
    });

    const info = document.getElementById('info-overlay');
    const signalDisplay = document.getElementById('no-signal');

    function switchChannel(index) {
        signalDisplay.style.display = "none";
        const target = playlist[index];
        
        // UI Update
        document.getElementById('ui-ch-num').innerText = `CHANNEL ${(index + 1).toString().padStart(2, '0')}`;
        document.getElementById('ui-ch-name').innerText = target.name;
        
        info.style.opacity = "1";
        setTimeout(() => { info.style.opacity = "0"; }, 5000);

        // Load Stream
        player.src({ type: 'application/x-mpegURL', src: target.url });
        player.play().catch(() => {
            signalDisplay.style.display = "flex";
        });
    }

    // Auto Fullscreen Trigger
    function enableFullscreen() {
        const elem = document.documentElement;
        if (elem.requestFullscreen) { elem.requestFullscreen(); }
        else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
    }

    // Remote Navigation
    window.addEventListener('keydown', (e) => {
        // Trigger Fullscreen on first button press
        enableFullscreen();

        if (e.key === "ArrowUp") {
            currentIdx = (currentIdx - 1 + playlist.length) % playlist.length;
            switchChannel(currentIdx);
        } else if (e.key === "ArrowDown") {
            currentIdx = (currentIdx + 1) % playlist.length;
            switchChannel(currentIdx);
        }
    });

    // Handle Error (Sinyal Teracak)
    player.on('error', () => {
        signalDisplay.style.display = "flex";
    });

    // Start
    switchChannel(currentIdx);
</script>
</body>
</html>
