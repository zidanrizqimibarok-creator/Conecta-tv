<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>CONECTA TV V17 - EXTREME</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; color: #fff; font-family: 'Arial Black', sans-serif; }
        
        /* Mesin Utama - Layer Transparan untuk Trigger */
        #engine-trigger {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; background: rgba(0,0,0,0.1); display: flex;
            align-items: center; justify-content: center; cursor: pointer;
        }

        #tv-frame { width: 100vw; height: 100vh; position: relative; }
        
        /* Video Player */
        iframe { width: 100%; height: 100%; border: none; position: absolute; z-index: 1; pointer-events: none; }

        /* Kotak Nama Premium */
        #info-bar { 
            position: absolute; bottom: 50px; left: 50px; 
            padding: 15px 40px; z-index: 100; opacity: 0; 
            transition: 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            background: #000; border-bottom: 8px solid #f00;
        }
        #info-bar.show { opacity: 1; transform: scale(1.1); }
        
        .type-label { font-size: 0.9rem; color: #ff0; letter-spacing: 5px; display: block; }
        #ch-title { margin: 0; font-size: 4rem; text-transform: uppercase; line-height: 1; }

        /* Filter Analog Hitam Putih */
        .mode-analog { filter: grayscale(100%) contrast(1.2); }
    </style>
</head>
<body>

<div id="engine-trigger" onclick="bootEngine()">
    <h2 id="msg">KETUK LAYAR UNTUK SINKRONISASI MESIN TV</h2>
</div>

<div id="tv-frame">
    <iframe id="main-engine" allow="autoplay; fullscreen"></iframe>
    <div id="info-bar">
        <span id="ch-type" class="type-label">DIGITAL</span>
        <h1 id="ch-title">OFFLINE</h1>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = {
        apiKey: "AIzaSyBoS3INezO0UQptcXYNZFbnPbmmf_hU8xc",
        authDomain: "xbook-global26.firebaseapp.com",
        databaseURL: "https://xbook-global26-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "xbook-global26",
        appId: "1:384795261277:web:6a2b05dbea819b4f4590b4"
    };

    const db = getDatabase(initializeApp(config));
    const player = document.getElementById('main-engine');
    const info = document.getElementById('info-bar');
    
    const channels = [
        { n: "Metro TV", id: "AUE5iHINUIw", t: "digital" },
        { n: "iNews", id: "Kz3FK5FbBz8", t: "analog" },
        { n: "Boomerang", id: "6a23sxk5_vM", t: "digital" },
        { n: "Cartoon TV", id: "U8ZzsbxbYcE", t: "analog" },
        { n: "Tom TV", id: "oV5gVoZQ7xU", t: "analog" }
    ];

    let currentIdx = 0;
    let engineReady = false;

    // MESIN BOOTING
    window.bootEngine = () => {
        engineReady = true;
        document.getElementById('engine-trigger').style.display = 'none';
        
        // Paksa Fullscreen
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        
        // Jalankan Mesin Sinkronisasi
        startSync();
    };

    function startSync() {
        onValue(ref(db, 'conecta_tv/current_idx'), (snap) => {
            if(!engineReady) return;
            currentIdx = snap.val() || 0;
            runTV();
        });
    }

    function runTV() {
        const ch = channels[currentIdx];
        if(!ch) return;

        // Injeksi Link ke Player
        player.src = `https://www.youtube.com/embed/${ch.id}?autoplay=1&controls=0&mute=0&rel=0&enablejsapi=1&origin=${window.location.origin}`;
        
        // Tampilkan Nama Channel
        document.getElementById('ch-title').innerText = ch.n;
        document.getElementById('ch-type').innerText = ch.t.toUpperCase();
        
        // Mode Analog (Hitam Putih)
        player.className = (ch.t === "analog") ? "mode-analog" : "";
        
        // Animasi Kotak Nama
        info.classList.add('show');
        setTimeout(() => info.classList.remove('show'), 5000);
    }

    // MESIN REMOTE PR/CH (Key Detection)
    window.addEventListener('keydown', (e) => {
        if(!engineReady) return;

        let next;
        if (e.key === "ArrowUp") {
            next = (currentIdx + 1) % channels.length;
        } else if (e.key === "ArrowDown") {
            next = (currentIdx - 1 + channels.length) % channels.length;
        } else {
            return;
        }

        // Eksekusi Instan (Tanpa Delay)
        currentIdx = next;
        runTV();
        
        // Update Cloud Database
        update(ref(db, 'conecta_tv'), { current_idx: next });
    });
</script>
</body>
</html>
