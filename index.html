<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONECTA TV V15</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; color: #fff; font-family: sans-serif; }
        
        /* Tombol Start agar Fullscreen & Remote Jalan */
        #btn-start {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; z-index: 9999; display: flex; align-items: center; justify-content: center;
        }
        #btn-start button {
            padding: 20px 40px; font-size: 1.5rem; font-weight: bold; cursor: pointer;
            background: #f00; color: #fff; border: none; border-radius: 10px;
        }

        #tv-screen { width: 100vw; height: 100vh; position: relative; }
        
        /* Video Player */
        iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }

        /* Noise Semut */
        #noise { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: url('https://upload.wikimedia.org/wikipedia/commons/5/5a/Static_noise.gif'); 
            z-index: 2; opacity: 0; pointer-events: none;
        }

        /* Kotak Nama */
        #info-bar { 
            position: absolute; bottom: 50px; left: 50px; 
            padding: 20px 40px; z-index: 100; opacity: 0; transition: 0.5s;
            background: rgba(0,0,0,0.8);
        }
        #info-bar.show { opacity: 1; }
        .digital-accent { border-left: 10px solid #00f2ff; }
        .analog-accent { border-left: 10px solid #ffaa00; }
        #ch-name { margin: 0; font-size: 3rem; text-transform: uppercase; }
        .analog-bw { filter: grayscale(100%); }
    </style>
</head>
<body>

<div id="btn-start">
    <button onclick="nyalakanTV()">MASUK MODE TV / NYALAKAN</button>
</div>

<div id="tv-screen">
    <div id="noise"></div>
    <iframe id="main-player" allow="autoplay; fullscreen"></iframe>
    <div id="info-bar">
        <div id="ch-gol" style="font-size: 0.8rem; letter-spacing: 2px;">DIGITAL</div>
        <h1 id="ch-name">LOADING...</h1>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = {
        apiKey: "AIzaSyBoS3INezO0UQptcXYNZFbnPbmmf_hU8xc",
        authDomain: "xbook-global26.firebaseapp.com",
        databaseURL: "https://xbook-global26-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "xbook-global26",
        appId: "1:384795261277:web:6a2b05dbea819b4f4590b4"
    };

    const app = initializeApp(config);
    const db = getDatabase(app);
    const player = document.getElementById('main-player');
    const info = document.getElementById('info-bar');
    const noise = document.getElementById('noise');

    const channelList = [
        { name: "Metro TV", id: "AUE5iHINUIw", type: "digital" },
        { name: "iNews", id: "Kz3FK5FbBz8", type: "analog" },
        { name: "Boomerang", id: "6a23sxk5_vM", type: "digital" },
        { name: "Cartoon TV", id: "U8ZzsbxbYcE", type: "analog" },
        { name: "Tom TV", id: "oV5gVoZQ7xU", type: "analog" }
    ];

    let currentIdx = 0;
    let tvAktif = false;
    let intA, intN;

    window.nyalakanTV = () => {
        tvAktif = true;
        document.getElementById('btn-start').style.display = 'none';
        
        // Minta Fullscreen Paksa
        const el = document.documentElement;
        if (el.requestFullscreen) el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        
        syncData();
    };

    function syncData() {
        onValue(ref(db, 'conecta_tv/current_idx'), (snap) => {
            if(!tvAktif) return;
            currentIdx = snap.val() || 0;
            updateLayar();
        });
    }

    function updateLayar() {
        const ch = channelList[currentIdx];
        if(!ch) return;

        player.src = `https://www.youtube.com/embed/${ch.id}?autoplay=1&controls=0&mute=0&rel=0&enablejsapi=1`;
        
        document.getElementById('ch-name').innerText = ch.name;
        document.getElementById('ch-gol').innerText = ch.type.toUpperCase() + " TV";
        
        info.className = (ch.type === "digital") ? "digital-accent show" : "analog-accent show";
        setTimeout(() => info.classList.remove('show'), 4000);

        // Reset Efek Analog
        clearInterval(intA); clearInterval(intN);
        player.classList.remove('analog-bw'); noise.style.opacity = 0;
        
        if (ch.type === "analog") {
            intA = setInterval(() => {
                player.classList.add('analog-bw');
                setTimeout(() => player.classList.remove('analog-bw'), 5000);
            }, 60000);
            intN = setInterval(() => {
                noise.style.opacity = 0.15;
                setTimeout(() => noise.style.opacity = 0, 500);
            }, 5000);
        }
    }

    // Fungsi Remote Keyboard
    window.addEventListener('keydown', (e) => {
        if(!tvAktif) return;
        let next;
        if (e.key === "ArrowUp") {
            next = (currentIdx + 1) % channelList.length;
            update(ref(db, 'conecta_tv'), { current_idx: next });
        } else if (e.key === "ArrowDown") {
            next = (currentIdx - 1 + channelList.length) % channelList.length;
            update(ref(db, 'conecta_tv'), { current_idx: next });
        }
    });
</script>
</body>
</html>
