<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Digital TV OS - Indonesia</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; overflow: hidden; }
        body { background: #000; font-family: 'Segoe UI', Roboto, sans-serif; cursor: none; }
        
        /* Layar Utama */
        #tv-screen { position: relative; width: 100vw; height: 100vh; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* Noise / No Signal */
        #no-signal { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #00008b; /* Biru TV Klasik */
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 5;
        }
        #no-signal .msg { color: white; font-size: 2.5rem; font-weight: bold; border: 4px solid white; padding: 10px 30px; }

        /* Overlay Info Channel (OSD) */
        #osd { 
            position: absolute; bottom: 8%; left: 5%; width: 400px;
            background: linear-gradient(90deg, rgba(0,0,50,0.9) 0%, rgba(0,0,0,0.6) 100%);
            color: white; padding: 20px; border-left: 10px solid #00fbff;
            transform: translateX(-150%); transition: transform 0.4s ease; z-index: 10;
        }
        #osd.active { transform: translateX(0); }
        #osd h1 { font-size: 4rem; line-height: 1; margin-bottom: 5px; }
        #osd .name { font-size: 1.5rem; text-transform: uppercase; white-space: nowrap; overflow: hidden; }
        #osd .tag { display: inline-block; background: #00fbff; color: #000; font-size: 0.8rem; padding: 2px 8px; font-weight: bold; margin-top: 10px; }

        /* Menu Daftar Saluran (Secret Shortcut) */
        #channel-menu {
            position: absolute; left: 0; top: 0; width: 350px; height: 100%;
            background: rgba(0, 0, 0, 0.9); border-right: 2px solid #333;
            transform: translateX(-100%); transition: 0.3s; z-index: 20; color: white;
        }
        #channel-menu.open { transform: translateX(0); }
        .menu-header { padding: 20px; background: #111; border-bottom: 2px solid #00fbff; font-weight: bold; }
        #list-items { height: calc(100% - 60px); overflow-y: auto; }
        .item { padding: 15px 20px; border-bottom: 1px solid #222; cursor: pointer; display: flex; justify-content: space-between; }
        .item:hover, .item.active { background: #00fbff; color: #000; }

        /* Nomor Shortcut di Pojok */
        #num-input {
            position: absolute; top: 40px; right: 50px; font-size: 5rem; color: #00fbff;
            text-shadow: 0 0 20px rgba(0,251,255,0.5); font-weight: bold; z-index: 30; display: none;
        }
    </style>
</head>
<body onclick="goFullscreen()">

    <div id="tv-screen">
        <div id="num-input"></div>

        <div id="no-signal">
            <div class="msg">TIDAK ADA SINYAL</div>
            <p style="color: #aaa; margin-top: 20px;">PERIKSA ANTENA ATAU KONEKSI INTERNET</p>
        </div>

        <video id="video-player" autoplay></video>

        <div id="osd">
            <h1 id="osd-num">01</h1>
            <div class="name" id="osd-name">DTV INDONESIA</div>
            <div class="tag">DIGITAL TV (HLS)</div>
        </div>

        <div id="channel-menu">
            <div class="menu-header">DAFTAR SALURAN (1-173)</div>
            <div id="list-items"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video-player');
        const osd = document.getElementById('osd');
        const menu = document.getElementById('channel-menu');
        const noSignal = document.getElementById('no-signal');
        const numInput = document.getElementById('num-input');
        
        let channels = [];
        let currentIndex = 0;
        let lastKeyTime = 0;
        let lastKey = "";
        let numBuffer = "";
        const hls = new Hls();

        // 1. Load Data
        fetch('https://iptv-org.github.io/iptv/languages/ind.m3u')
            .then(res => res.text())
            .then(data => {
                const lines = data.split('\n');
                let count = 1;
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF')) {
                        const name = lines[i].split(',')[1].trim();
                        const url = lines[i + 1].trim();
                        channels.push({ id: count++, name, url });
                    }
                }
                renderList();
                playChannel(0);
            });

        function renderList() {
            const container = document.getElementById('list-items');
            channels.forEach((ch, index) => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `<span>${ch.id}. ${ch.name}</span> <small>DTV</small>`;
                div.onclick = () => { playChannel(index); menu.classList.remove('open'); };
                container.appendChild(div);
            });
        }

        function playChannel(index) {
            if (index < 0) index = channels.length - 1;
            if (index >= channels.length) index = 0;
            currentIndex = index;
            
            const target = channels[index];
            noSignal.style.display = 'none';
            
            // OSD Update
            document.getElementById('osd-num').innerText = target.id.toString().padStart(2, '0');
            document.getElementById('osd-name').innerText = target.name;
            osd.classList.add('active');
            setTimeout(() => osd.classList.remove('active'), 5000);

            // Stream Engine
            if (Hls.isSupported()) {
                hls.detachMedia();
                hls.loadSource(target.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
                
                // Jika loading gagal dalam 10 detik
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) noSignal.style.display = 'flex';
                });
            }
        }

        // Navigasi Remote
        window.addEventListener('keydown', (e) => {
            const currentTime = new Date().getTime();

            // Deteksi Shortcut: ATAS lalu BAWAH cepat (Menu)
            if (lastKey === "ArrowUp" && e.key === "ArrowDown" && (currentTime - lastKeyTime) < 500) {
                menu.classList.toggle('open');
            }
            
            if (e.key === "ArrowUp") playChannel(currentIndex - 1);
            if (e.key === "ArrowDown") playChannel(currentIndex + 1);

            // Shortcut Nomor Langsung
            if (/[0-9]/.test(e.key)) {
                numBuffer += e.key;
                numInput.innerText = numBuffer;
                numInput.style.display = 'block';
                
                clearTimeout(window.numTimer);
                window.numTimer = setTimeout(() => {
                    const targetId = parseInt(numBuffer);
                    const foundIndex = channels.findIndex(c => c.id === targetId);
                    if (foundIndex !== -1) playChannel(foundIndex);
                    numBuffer = "";
                    numInput.style.display = 'none';
                }, 1200);
            }

            lastKey = e.key;
            lastKeyTime = currentTime;
        });

        function goFullscreen() {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
        }
    </script>
</body>
</html>
