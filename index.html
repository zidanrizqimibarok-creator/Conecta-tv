<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONECTA TV - FINAL PREMIUM</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Arial', sans-serif; cursor: none; color: #fff; }
        #tv-container { width: 100vw; height: 100vh; position: relative; display: flex; align-items: center; justify-content: center; }
        .video-js { width: 100% !important; height: 100% !important; }

        /* --- Animasi Tanda Seru (!) --- */
        #error-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .bang-icon {
            font-size: 10rem; color: #ff0000; font-weight: 900;
            animation: bang-bounce 0.7s infinite alternate;
            text-shadow: 0 0 40px rgba(255, 0, 0, 0.6);
        }
        #error-overlay h1 { color: #ff0000; letter-spacing: 5px; margin-top: 20px; font-size: 1.5rem; }

        @keyframes bang-bounce { from { transform: scale(1); } to { transform: scale(1.2); } }

        /* --- Info Channel (Nama Putih) --- */
        #channel-info {
            position: absolute; bottom: 8%; left: 5%;
            background: rgba(0,0,0,0.85); padding: 20px 50px; border-left: 10px solid #ff0000;
            opacity: 0; transition: 0.4s; z-index: 110; pointer-events: none;
        }
        #channel-info.show { opacity: 1; }
        #ch-name { margin: 0; font-size: 3.5rem; font-weight: 900; color: #ffffff; text-transform: uppercase; }
        #ch-num { margin: 0; font-size: 1.2rem; color: #ff0000; font-weight: bold; }

        /* --- Watermark CONECTA --- */
        .conecta-logo {
            position: absolute; bottom: 18%; left: 30px; 
            color: rgba(255,255,255,0.15); font-weight: bold; 
            font-size: 1.2rem; letter-spacing: 5px; z-index: 50;
        }
    </style>
</head>
<body>

<div id="tv-container">
    <div class="conecta-logo">CONECTA</div>

    <div id="error-overlay">
        <div class="bang-icon">!</div>
        <h1>KONEKSI TERPUTUS!</h1>
    </div>

    <video id="main-video" class="video-js vjs-big-play-centered" preload="auto"></video>

    <div id="channel-info">
        <p id="ch-num">CH 01</p>
        <h1 id="ch-name">LOADING...</h1>
    </div>
</div>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
<script>
    // Playlist Full Live (Ganti URL m3u8 jika mati)
    const playlist = [
        { name: "iNews TV", url: "https://vcl.rctiplus.id/hls/inews/v1/master.m3u8" },
        { name: "RCTI", url: "https://vcl.rctiplus.id/hls/rcti/v1/master.m3u8" },
        { name: "GTV", url: "https://vcl.rctiplus.id/hls/gtv/v1/master.m3u8" },
        { name: "MNCTV", url: "https://vcl.rctiplus.id/hls/mnctv/v1/master.m3u8" },
        { name: "RTV", url: "https://rtv-live.akamaized.net/hls/live/2043517/rtv/master.m3u8" },
        { name: "Trans7", url: "https://trans7-live.akamaized.net/hls/live/2034360/trans7/master.m3u8" },
        { name: "Metro TV", url: "https://metrotv-live.akamaized.net/hls/live/2032541/metro/master.m3u8" }
    ];

    let currentIdx = 0;
    const player = videojs('main-video', { autoplay: true, controls: false });
    const infoBox = document.getElementById('channel-info');
    const errorSc = document.getElementById('error-overlay');

    function playCH(idx) {
        errorSc.style.display = "none";
        const target = playlist[idx];
        
        // Update Tampilan Info
        document.getElementById('ch-num').innerText = `CHANNEL ${(idx + 1).toString().padStart(2, '0')}`;
        document.getElementById('ch-name').innerText = target.name;
        
        infoBox.classList.add('show');
        setTimeout(() => infoBox.classList.remove('show'), 5000);

        // Load Stream
        player.src({ type: 'application/x-mpegURL', src: target.url });
        player.play().catch(() => { errorSc.style.display = "flex"; });
    }

    // Navigasi Remote PR/CH
    window.addEventListener('keydown', (e) => {
        // Otomatis Fullscreen saat ganti channel
        if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});

        if (e.key === "ChannelUp" || e.key === "ArrowUp" || e.keyCode === 427) {
            currentIdx = (currentIdx + 1) % playlist.length;
            playCH(currentIdx);
        } else if (e.key === "ChannelDown" || e.key === "ArrowDown" || e.keyCode === 428) {
            currentIdx = (currentIdx - 1 + playlist.length) % playlist.length;
            playCH(currentIdx);
        }
    });

    player.on('error', () => { errorSc.style.display = "flex"; });
    
    // Start
    playCH(currentIdx);
</script>
</body>
</html>
