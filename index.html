<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>CONECTA T.O - TV V10</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; color: #fff; font-family: 'Arial Black', sans-serif; cursor: none; }
        #tv-screen { width: 100vw; height: 100vh; position: relative; display: flex; align-items: center; justify-content: center; }
        iframe { width: 100%; height: 100%; border: none; position: absolute; }
        #error-sc { position: absolute; width: 100%; height: 100%; background: #000; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .bang { font-size: 15rem; color: #f00; animation: bounce 0.5s infinite alternate; }
        #info-bar { position: absolute; bottom: 8%; left: 5%; background: rgba(0,0,0,0.9); padding: 15px 45px; border-left: 10px solid #f00; opacity: 0; transition: 0.4s; z-index: 110; }
        #info-bar.show { opacity: 1; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }
    </style>
</head>
<body>
    <div id="tv-screen">
        <div id="error-sc"><div class="bang">!</div><h1 style="color:#f00">NO SIGNAL</h1></div>
        <iframe id="main-player" allow="autoplay; fullscreen"></iframe>
        <div id="info-bar">
            <p id="ch-idx" style="margin:0; color:#f00; font-weight:bold;">CH</p>
            <h2 id="ch-title" style="margin:0; font-size:3.5rem;">LOADING...</h2>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = {
        apiKey: "AIzaSyBoS3INezO0UQptcXYNZFbnPbmmf_hU8xc",
        authDomain: "xbook-global26.firebaseapp.com",
        databaseURL: "https://xbook-global26-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "xbook-global26",
        appId: "1:384795261277:web:6a2b05dbea819b4f4590b4"
    };

    const db = getDatabase(initializeApp(config));
    const frame = document.getElementById('main-player');
    const info = document.getElementById('info-bar');
    const err = document.getElementById('error-sc');

    const defaultCH = [
        { name: "Upin Ipin Live", id: "live_stream?channel=UCp0C_O9vV3-O3_Vn2p8mC9g" },
        { name: "Disney Kids", id: "P2v6i_L_S_0" },
        { name: "Marvel TV", id: "rS8_6t6SIsE" },
        { name: "Boomerang TV", id: "65IsA_SshL4" },
        { name: "Disney Channel", id: "w7pYhp496tg" },
        { name: "TVRI World", id: "eE5E8MXQpqc" },
        { name: "TVRI Sport", id: "6a23sxk5_vM" },
        { name: "Kompas TV", id: "2MC5ltEDu7w" },
        { name: "CNN Indonesia", id: "YbQwgoMoztA" },
        { name: "Al Jazeera", id: "_HviSyC7zSU" }
    ];

    let current = 0;

    onValue(ref(db, 'conecta_status'), (snap) => {
        const data = snap.val();
        if(!data) return;

        if (data.connection === "OFF") {
            err.style.display = "flex";
            frame.src = "";
        } else {
            err.style.display = "none";
            current = data.current_ch || 0;
            
            // Cek apakah channel ini dihapus/disembunyikan
            if (data.hidden_channels && data.hidden_channels[current]) {
                document.getElementById('ch-title').innerText = "CHANNEL DIHAPUS";
                frame.src = "";
                return;
            }

            const vidId = data.custom_url || defaultCH[current].id;
            const chName = data.force_name || defaultCH[current].name;

            frame.src = `https://www.youtube.com/embed/${vidId}?autoplay=1&controls=0&cc_load_policy=1&cc_lang_pref=id&hl=id`;
            document.getElementById('ch-idx').innerText = `CH ${(current + 1).toString().padStart(2, '0')}`;
            document.getElementById('ch-title').innerText = chName;
            
            info.classList.add('show');
            setTimeout(() => info.classList.remove('show'), 5000);
        }
    });

    window.addEventListener('keydown', (e) => {
        if (e.key === "ArrowUp" || e.keyCode === 427) {
            set(ref(db, 'conecta_status/current_ch'), (current + 1) % defaultCH.length);
            set(ref(db, 'conecta_status/connection'), "ON");
        }
        if (e.key === "ArrowDown" || e.keyCode === 428) {
            set(ref(db, 'conecta_status/current_ch'), (current - 1 + defaultCH.length) % defaultCH.length);
            set(ref(db, 'conecta_status/connection'), "ON");
        }
    });
</script>
</body>
</html>
