<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONECTA TV - Remote Only</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; cursor: none; color: #fff; }
        #video-container { width: 100vw; height: 100vh; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        .video-js { width: 100% !important; height: 100% !important; z-index: 1; }

        /* Sinyal Teracak Premium */
        #no-signal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            display: none; z-index: 10; flex-direction: column; align-items: center; justify-content: center;
        }
        .satellite-anim { font-size: 6rem; animation: rotateSat 15s linear infinite; opacity: 0.6; margin-bottom: 20px; }
        #no-signal-overlay h1 { font-size: 2rem; letter-spacing: 2px; text-transform: uppercase; animation: blink 1.5s infinite; }

        @keyframes rotateSat { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Info Channel */
        #info-overlay {
            position: absolute; bottom: 8%; left: 5%;
            background: linear-gradient(90deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            padding: 20px 40px; border-left: 6px solid #ff0000;
            opacity: 0; transition: all 0.4s ease; transform: translateX(-20px); z-index: 20;
        }
        #info-overlay.show { opacity: 1; transform: translateX(0); }
        #info-overlay h2 { margin: 0; font-size: 3.5rem; font-weight: 900; }
        #info-overlay p { margin: 0; font-size: 1.2rem; color: #ff0000; font-weight: bold; }

        /* Watermark */
        .brand-watermark {
            position: absolute; bottom: 15%; left: 25px; 
            color: rgba(255,255,255,0.15); font-weight: bold; 
            font-size: 1.1rem; letter-spacing: 4px; z-index: 5;
        }
    </style>
</head>
<body>

<div id="video-container">
    <div class="brand-watermark">CONECTA</div>
    
    <div id="no-signal-overlay">
        <div class="satellite-anim">📡</div>
        <h1>Koneksi Terputus!</h1>
    </div>

    <video id="tv-player" class="video-js vjs-big-play-centered" preload="auto"></video>

    <div id="info-overlay">
        <p id="ui-ch-num">CH 01</p>
        <h2 id="ui-ch-name">LOADING...</h2>
    </div>
</div>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
<script>
    const channels = [
        { name: "RCTI", url: "https://p.rctiplus.id/hls/rcti/v1/master.m3u8" },
        { name: "MNCTV", url: "https://p.rctiplus.id/hls/mnctv/v1/master.m3u8" },
        { name: "GTV", url: "https://p.rctiplus.id/hls/gtv/v1/master.m3u8" },
        { name: "iNews", url: "https://p.rctiplus.id/hls/inews/v1/master.m3u8" },
        { name: "RTV", url: "https://example.com/rtv.m3u8" },
        { name: "SCTV", url: "https://example.com/sctv.m3u8" },
        { name: "Trans 7", url: "https://example.com/trans7.m3u8" },
        { name: "METRO TV", url: "https://example.com/metro.m3u8" },
        { name: "TVRI", url: "https://example.com/tvri.m3u8" }
    ];

    let currentIdx = 0;
    let infoTimer;

    const player = videojs('tv-player', { autoplay: true, controls: false });
    const signal = document.getElementById('no-signal-overlay');
    const infoBox = document.getElementById('info-overlay');

    function playCH(idx) {
        signal.style.display = "none";
        const ch = channels[idx];
        
        document.getElementById('ui-ch-num').innerText = `CH ${(idx + 1).toString().padStart(2, '0')}`;
        document.getElementById('ui-ch-name').innerText = ch.name;
        
        infoBox.classList.add('show');
        clearTimeout(infoTimer);
        infoTimer = setTimeout(() => infoBox.classList.remove('show'), 4000);

        player.src({ type: 'application/x-mpegURL', src: ch.url });
        player.play().catch(() => signal.style.display = "flex");
    }

    player.on('error', () => signal.style.display = "flex");

    // SCRIPT KHUSUS REMOTE (Foto PR/CH)
    window.addEventListener('keydown', (e) => {
        // Fullscreen otomatis saat tombol ditekan
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {});
        }

        // Deteksi tombol PR/CH (Channel Up/Down) atau Panah Keyboard
        if (e.key === "ChannelUp" || e.key === "ArrowUp" || e.keyCode === 427) {
            currentIdx = (currentIdx + 1) % channels.length;
            playCH(currentIdx);
        } 
        else if (e.key === "ChannelDown" || e.key === "ArrowDown" || e.keyCode === 428) {
            currentIdx = (currentIdx - 1 + channels.length) % channels.length;
            playCH(currentIdx);
        }
    });

    playCH(currentIdx);
</script>
</body>
</html>
