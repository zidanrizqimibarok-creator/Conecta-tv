<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONECTA T.O V20 - IPTV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; cursor: none; color: #fff; font-family: 'Arial Black', sans-serif; }
        #booting { position: absolute; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .boot-text { font-size: 3rem; letter-spacing: 15px; animation: flash 1.5s infinite; }
        
        #video-container { width: 100%; height: 100%; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* NO SIGNAL OVERLAY */
        #no-signal-box {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 900; display: none;
            align-items: center; justify-content: center;
        }
        .error-msg {
            padding: 20px 50px; border: 4px solid #fff;
            font-size: 2.5rem; background: #000; color: #fff;
        }

        #dash {
            position: absolute; bottom: 5%; left: 3%; right: 3%;
            background: rgba(0,0,0,0.9); border-left: 12px solid #ff0000;
            padding: 20px 40px; transform: translateY(200%); transition: 0.5s;
            z-index: 950; backdrop-filter: blur(8px);
        }
        #dash.show { transform: translateY(0); }
        .ch-name { font-size: 3.5rem; margin: 0; text-transform: uppercase; line-height: 1.1; }
        .tag { padding: 5px 12px; font-size: 0.8rem; border-radius: 4px; margin-right: 5px; font-weight: bold; }
        .uhf-code { color: #00f2ff; font-family: monospace; font-size: 1.1rem; margin-top: 10px; display: block; }
        
        .analog-bw { filter: grayscale(100%) contrast(1.1); }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body onclick="startTV()">

<div id="booting"><div class="boot-text">CONECTA T.O</div></div>

<div id="video-container">
    <div id="no-signal-box"><div class="error-msg">! NO SIGNAL</div></div>
    <video id="main-video" autoplay playsinline></video>
</div>

<div id="dash">
    <div style="margin-bottom: 5px;">
        <span class="tag" id="mode-tag" style="background:#ff0000">● LIVE</span>
        <span class="tag" style="background:#0056b3">IPTV STREAM</span>
    </div>
    <h1 class="ch-name" id="ch-title">LOADING...</h1>
    <span class="uhf-code" id="ch-uhf">UHF: -- | TF: ---.-- KHZ</span>
</div>

<script>
    const video = document.getElementById('main-video');
    const nosignal = document.getElementById('no-signal-box');
    const dash = document.getElementById('dash');
    const hls = new Hls();

    // DAFTAR CHANNEL CAMPURAN (DARI M3U INDO)
    const channels = [
        { name: "TVRI Nasional", url: "https://vcl.tvri.go.id/hls/nasional.m3u8", type: "D", uhf: "32", tf: "562.00" },
        { name: "Indosiar", url: "https://edge.vcloud.id/indosiar/live.m3u8", type: "A", uhf: "44", tf: "658.25" },
        { name: "Metro TV", url: "https://live.metrotvnews.com/metrotv/index.m3u8", type: "D", uhf: "32", tf: "562.00" },
        { name: "SCTV", url: "https://edge.vcloud.id/sctv/live.m3u8", type: "A", uhf: "37", tf: "602.25" },
        { name: "Trans TV", url: "https://edge.vcloud.id/transtv/live.m3u8", type: "D", uhf: "21", tf: "474.00" },
        { name: "Tom TV (Cartoon)", url: "https://XfZetbS9084.m3u8", type: "A", uhf: "29", tf: "538.25" } // Contoh analog
    ];

    let current = 0;
    let signalInterval;
    let isStarted = false;

    function startTV() {
        if(isStarted) return;
        isStarted = true;
        document.getElementById('booting').style.display = "none";
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        playChannel(current);
    }

    function playChannel(idx) {
        clearInterval(signalInterval);
        nosignal.style.display = "none";
        video.muted = false;

        const c = channels[idx];
        document.getElementById('ch-title').innerText = c.name;
        document.getElementById('ch-uhf').innerText = `UHF: ${c.uhf} | TF: ${c.tf} KHZ`;

        // Setting Tipe A atau D
        if(c.type === "A") {
            video.className = "analog-bw";
            document.getElementById('mode-tag').innerText = "● ANALOG";
            document.getElementById('mode-tag').style.background = "#555";
            
            signalInterval = setInterval(() => {
                nosignal.style.display = "flex";
                video.muted = true; // Mute pas no signal
                setTimeout(() => { 
                    nosignal.style.display = "none"; 
                    video.muted = false;
                }, 1500);
            }, 10000);
        } else {
            video.className = "";
            document.getElementById('mode-tag').innerText = "● DIGITAL";
            document.getElementById('mode-tag').style.background = "#ff0000";
        }

        // Mesin Pemutar M3U8 (VLC Style)
        if (Hls.isSupported()) {
            hls.loadSource(c.url);
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = c.url;
        }

        dash.classList.add('show');
        setTimeout(() => dash.classList.remove('show'), 5000);
    }

    // --- TEMPAT SAKRAL PR/CH (TIDAK DIUBAH) ---
    window.addEventListener('keydown', (e) => {
        if (!isStarted) return;
        if (e.key === "ArrowUp" || e.keyCode === 38 || e.keyCode === 427) {
            current = (current + 1) % channels.length;
            playChannel(current);
        } else if (e.key === "ArrowDown" || e.keyCode === 40 || e.keyCode === 428) {
            current = (current - 1 + channels.length) % channels.length;
            playChannel(current);
        }
    });
</script>
</body>
</html>
