<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>i CCTV V3 - Auto AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; text-align: center; }
        #video-container { position: relative; width: 100vw; height: 70vh; background: #111; }
        img { width: 100%; height: 100%; object-fit: contain; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .ui { padding: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        button { padding: 15px; border-radius: 10px; border: none; background: #007aff; color: white; font-weight: bold; }
        .alert { position: fixed; top: 10px; width: 100%; color: red; font-weight: bold; display: none; z-index: 100; }
        #loader { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 200; }
    </style>
</head>
<body>
    <div id="loader">MENGUNDUH MESIN AI...</div>
    <div class="alert" id="warn">⚠️ ADA ORANG!</div>
    
    <div id="video-container">
        <img id="cctv" src="http://192.168.0.105:8080/shot.jpg" crossorigin="anonymous">
        <canvas id="canvas"></canvas>
    </div>

    <div class="ui">
        <button onclick="toggleAI()" id="btn">START AI SCANNER</button>
        <button onclick="location.reload()" style="background: #333;">REFRESH</button>
        <button onclick="snap()" style="background: #34c759;">AMBIL FOTO</button>
    </div>

    <script>
        let model, active = false;
        const img = document.getElementById('cctv');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Load AI
        cocoSsd.load().then(m => {
            model = m;
            document.getElementById('loader').style.display = 'none';
        });

        // Loop Gambar
        setInterval(() => {
            img.src = "http://192.168.0.105:8080/shot.jpg?t=" + Date.now();
        }, 500);

        async function detect() {
            if(!active) return;
            canvas.width = img.clientWidth;
            canvas.height = img.clientHeight;
            const preds = await model.detect(img);
            
            ctx.clearRect(0,0, canvas.width, canvas.height);
            let found = false;
            preds.forEach(p => {
                if(p.class === 'person') {
                    found = true;
                    ctx.strokeStyle = 'red';
                    ctx.lineWidth = 4;
                    ctx.strokeRect(...p.bbox);
                }
            });
            document.getElementById('warn').style.display = found ? 'block' : 'none';
            requestAnimationFrame(detect);
        }

        function toggleAI() {
            active = !active;
            document.getElementById('btn').innerText = active ? "STOP AI" : "START AI";
            if(active) detect();
        }

        function snap() {
            const c = document.createElement('canvas');
            c.width = img.naturalWidth; c.height = img.naturalHeight;
            c.getContext('2d').drawImage(img, 0, 0);
            const a = document.createElement('a');
            a.href = c.toDataURL(); a.download = 'cctv.png'; a.click();
        }
    </script>
</body>
</html>
