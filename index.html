<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONECTA TV V16</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; color: #fff; font-family: 'Segoe UI', sans-serif; }
        
        /* Tombol Start */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center;
        }
        #start-overlay button {
            padding: 25px 50px; font-size: 1.8rem; font-weight: 900; cursor: pointer;
            background: #222; color: #00f2ff; border: 4px solid #00f2ff; border-radius: 15px;
            box-shadow: 0 0 20px #00f2ff; transition: 0.3s;
        }
        #start-overlay button:hover { background: #00f2ff; color: #000; }

        #tv-container { width: 100vw; height: 100vh; position: relative; }
        
        /* Player di Layer Terdepan */
        iframe { width: 100%; height: 100%; border: none; position: absolute; z-index: 1; pointer-events: none; }

        /* Kotak Info Nama Channel */
        #info-bar { 
            position: absolute; bottom: 60px; left: 60px; 
            padding: 15px 40px; z-index: 100; opacity: 0; 
            transition: transform 0.4s ease, opacity 0.4s;
            background: rgba(0,0,0,0.85);
            transform: translateY(30px);
        }
        #info-bar.show { opacity: 1; transform: translateY(0); }
        
        .digital-tag { border-left: 12px solid #00f2ff; }
        .analog-tag { border-left: 12px solid #ffffff; }

        #ch-title { margin: 0; font-size: 3.8rem; font-weight: 900; text-transform: uppercase; letter-spacing: -2px; }
        .ch-type { font-size: 1rem; letter-spacing: 5px; color: #aaa; margin-bottom: 5px; display: block; }

        /* Filter Analog Hitam Putih Permanen */
        .analog-mode { filter: grayscale(100%) contrast(110%); }
    </style>
</head>
<body onclick="powerOn()">

<div id="start-overlay">
    <button onclick="powerOn()">NYALAKAN CONECTA TV</button>
</div>

<div id="tv-container">
    <iframe id="tv-player" allow="autoplay; fullscreen"></iframe>
    <div id="info-bar">
        <span id="ch-type-label" class="ch-type">DIGITAL</span>
        <h1 id="ch-title">OFFLINE</h1>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = {
        apiKey: "AIzaSyBoS3INezO0UQptcXYNZFbnPbmmf_hU8xc",
        authDomain: "xbook-global26.firebaseapp.com",
        databaseURL: "https://xbook-global26-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "xbook-global26",
        appId: "1:384795261277:web:6a2b05dbea819b4f4590b4"
    };

    const app = initializeApp(config);
    const db = getDatabase(app);
    const player = document.getElementById('tv-player');
    const info = document.getElementById('info-bar');

    const channels = [
        { name: "Metro TV", id: "AUE5iHINUIw", type: "digital" },
        { name: "iNews", id: "Kz3FK5FbBz8", type: "analog" },
        { name: "Boomerang", id: "6a23sxk5_vM", type: "digital" },
        { name: "Cartoon TV", id: "U8ZzsbxbYcE", type: "analog" },
        { name: "Tom TV", id: "oV5gVoZQ7xU", type: "analog" }
    ];

    let currentIdx = 0;
    let isLive = false;

    window.powerOn = () => {
        if(isLive) return;
        isLive = true;
        document.getElementById('start-overlay').style.display = 'none';
        
        // Fullscreen Paksa
        const doc = document.documentElement;
        if (doc.requestFullscreen) doc.requestFullscreen();
        
        // Ambil data posisi terakhir
        onValue(ref(db, 'conecta_tv/current_idx'), (snap) => {
            const cloudIdx = snap.val() || 0;
            if(currentIdx !== cloudIdx || player.src === "") {
                currentIdx = cloudIdx;
                loadChannel();
            }
        });
    };

    function loadChannel() {
        const ch = channels[currentIdx];
        if(!ch) return;

        // Pasang Link Video
        player.src = `https://www.youtube.com/embed/${ch.id}?autoplay=1&controls=0&mute=0&rel=0&enablejsapi=1&origin=${window.location.origin}`;
        
        // Update Teks & Kotak
        document.getElementById('ch-title').innerText = ch.name;
        document.getElementById('ch-type-label').innerText = ch.type.toUpperCase() + " TV";
        
        // Efek Hitam Putih jika Analog
        if(ch.type === "analog") {
            player.className = "analog-mode";
            info.className = "analog-tag show";
        } else {
            player.className = "";
            info.className = "digital-tag show";
        }
        
        // Hilangkan Kotak Info dalam 4 detik
        setTimeout(() => info.classList.remove('show'), 4000);
    }

    // Remote PR/CH Keyboard (Arrow Up & Down)
    window.addEventListener('keydown', (e) => {
        if(!isLive) return;
        
        let newIdx = currentIdx;
        if (e.key === "ArrowUp") {
            newIdx = (currentIdx + 1) % channels.length;
        } else if (e.key === "ArrowDown") {
            newIdx = (currentIdx - 1 + channels.length) % channels.length;
        } else {
            return; // abaikan tombol lain
        }

        // Jalankan perubahan secara instan di layar
        currentIdx = newIdx;
        loadChannel();
        
        // Kirim laporan ke Cloud Firebase
        set(ref(db, 'conecta_tv/current_idx'), newIdx);
    });
</script>
</body>
</html>
