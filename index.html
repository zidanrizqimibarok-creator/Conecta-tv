<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONECTA TV - Anti Error</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; cursor: none; color: #fff; font-family: sans-serif; }
        #tv-screen { width: 100vw; height: 100vh; position: relative; }
        
        /* Iframe YouTube Full Screen */
        iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; }

        /* Animasi Tanda Seru (!) Jika Offline */
        #error-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .bang { font-size: 12rem; color: #f00; font-weight: 900; animation: pulse 0.6s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.2); } }

        /* Info Channel Putih */
        #info-box {
            position: absolute; bottom: 8%; left: 5%;
            background: rgba(0,0,0,0.85); padding: 15px 40px; border-left: 10px solid #f00;
            opacity: 0; transition: 0.4s; z-index: 110;
        }
        #info-box.show { opacity: 1; }
        #info-box h1 { margin: 0; font-size: 3.5rem; color: #fff; text-transform: uppercase; }

        /* Watermark */
        .watermark { position: absolute; bottom: 18%; left: 30px; color: rgba(255,255,255,0.1); font-weight: bold; letter-spacing: 5px; z-index: 50; }
    </style>
</head>
<body>

<div id="tv-screen">
    <div class="watermark">CONECTA</div>
    <div id="error-overlay"><div class="bang">!</div><h1 style="color:#f00">KONEKSI TERPUTUS!</h1></div>
    
    <iframe id="player" allow="autoplay; fullscreen"></iframe>

    <div id="info-box">
        <p id="ch-num" style="margin:0; color:#f00; font-weight:bold;">CH 01</p>
        <h1 id="ch-name">LOADING...</h1>
    </div>
</div>

<script>
    // Daftar Channel YouTube (Pasti Bisa Fullscreen & Anti Ribet)
    const channels = [
        { name: "iNews TV", id: "Kz3FK5FbBz8" },
        { name: "TVRI Nasional", id: "sAFSy3ys-ns" },
        { name: "Metro TV", id: "AUE5iHINUIw" },
        { name: "Trans7 (Official)", id: "N6H_7ZJ0O_M" }, // Link YT Trans7 sering berubah, ini id cadangan
        { name: "Kompas TV", id: "X_m7W43_MvI" }
    ];

    let currentIdx = 0;
    const player = document.getElementById('player');
    const info = document.getElementById('info-box');
    const error = document.getElementById('error-overlay');

    function play(idx) {
        if (!navigator.onLine) { error.style.display = "flex"; return; }
        error.style.display = "none";
        
        const ch = channels[idx];
        document.getElementById('ch-num').innerText = `CHANNEL ${(idx+1).toString().padStart(2, '0')}`;
        document.getElementById('ch-name').innerText = ch.name;
        
        info.classList.add('show');
        setTimeout(() => info.classList.remove('show'), 4000);

        // Load YouTube Embed dengan AutoPlay & No Controls
        player.src = `https://www.youtube.com/embed/${ch.id}?autoplay=1&controls=0&rel=0&modestbranding=1&showinfo=0`;
    }

    // Navigasi Remote PR/CH
    window.addEventListener('keydown', (e) => {
        // Otomatis Fullscreen saat ganti channel
        if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});

        if (e.key === "ChannelUp" || e.key === "ArrowUp" || e.keyCode === 427) {
            currentIdx = (currentIdx + 1) % channels.length;
            play(currentIdx);
        } else if (e.key === "ChannelDown" || e.key === "ArrowDown" || e.keyCode === 428) {
            currentIdx = (currentIdx - 1 + channels.length) % channels.length;
            play(currentIdx);
        }
    });

    play(currentIdx);
</script>
</body>
</html>
