<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONECTA T.O V21 - AUTO SCREEN</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; color: #fff; font-family: 'Arial Black', sans-serif; }
        
        /* Layer Trigger Awal */
        #start-engine { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 9999; display: flex; align-items: center; justify-content: center;
            background: #000; cursor: pointer;
        }

        #booting { position: absolute; width: 100%; height: 100%; background: #000; z-index: 1000; display: none; align-items: center; justify-content: center; }
        .boot-text { font-size: 3rem; letter-spacing: 15px; animation: flash 1.5s infinite; }
        
        #tv-screen { width: 100%; height: 100%; position: relative; }
        video, iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; pointer-events: none; }

        #no-signal-box {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 900; display: none;
            align-items: center; justify-content: center;
        }
        .error-msg { padding: 20px 50px; border: 4px solid #fff; font-size: 2.5rem; background: #000; }

        #dash {
            position: absolute; bottom: 5%; left: 3%; right: 3%;
            background: rgba(0,0,0,0.9); border-left: 12px solid #ff0000;
            padding: 20px 40px; transform: translateY(200%); transition: 0.5s;
            z-index: 950; backdrop-filter: blur(8px);
        }
        #dash.show { transform: translateY(0); }
        .ch-name { font-size: 3.5rem; margin: 0; text-transform: uppercase; line-height: 1; }
        .tag { padding: 5px 12px; font-size: 0.8rem; border-radius: 4px; margin-right: 5px; font-weight: bold; }
        .uhf-code { color: #00f2ff; font-family: monospace; font-size: 1.1rem; margin-top: 10px; display: block; }
        
        .analog-bw { filter: grayscale(100%) contrast(1.1); }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body onclick="bootEngine()">

<div id="start-engine">
    <div class="boot-text" style="font-size: 1.5rem;">KETUK LAYAR UNTUK MENYALAKAN TV</div>
</div>

<div id="booting"><div class="boot-text">CONECTA T.O</div></div>

<div id="tv-screen">
    <div id="no-signal-box"><div class="error-msg">! NO SIGNAL</div></div>
    <iframe id="yt-player" allow="autoplay; fullscreen" style="display:none;"></iframe>
    <video id="iptv-player" autoplay playsinline style="display:none;"></video>
</div>

<div id="dash">
    <div style="margin-bottom: 5px;">
        <span class="tag" id="mode-text" style="background:#ff0000">● LIVE</span>
        <span id="ch-loc" class="tag" style="background:#0056b3">INDONESIA</span>
    </div>
    <h1 class="ch-name" id="ch-title">LOADING...</h1>
    <span class="uhf-code" id="ch-uhf">UHF: 00 | TF: 000.00 KHZ</span>
</div>

<script>
    const channels = [
        { name: "Metro TV", id: "AUE5iHINUIw", type: "D", src: "yt", uhf: "32", tf: "562.00" },
        { name: "Trans TV", id: "https://idp.mivo.com/mivo/transtv/playlist.m3u8", type: "A", src: "iptv", uhf: "40", tf: "626.25" },
        { name: "iNews", id: "Kz3FK5FbBz8", type: "D", src: "yt", uhf: "44", tf: "658.00" },
        { name: "SCTV", id: "https://video.liputan6.com/sctv/live/playlist.m3u8", type: "A", src: "iptv", uhf: "30", tf: "546.25" },
        { name: "TVRI Sport", id: "6a23sxk5_vM", type: "A", src: "yt", uhf: "21", tf: "474.25" }
    ];

    let current = 0;
    let signalInterval;
    let isStarted = false;
    const ytFrame = document.getElementById('yt-player');
    const iptvVideo = document.getElementById('iptv-player');
    const dash = document.getElementById('dash');
    const nosignal = document.getElementById('no-signal-box');
    const hls = new Hls();

    window.bootEngine = () => {
        if(isStarted) return;
        isStarted = true;
        
        // Auto Fullscreen
        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen().catch(() => {});
        }

        document.getElementById('start-engine').style.display = 'none';
        document.getElementById('booting').style.display = 'flex';

        setTimeout(() => {
            document.getElementById('booting').style.display = "none";
            play(current);
        }, 3000);
    };

    function play(idx) {
        clearInterval(signalInterval);
        nosignal.style.display = "none";
        const c = channels[idx];

        document.getElementById('ch-title').innerText = c.name;
        document.getElementById('ch-uhf').innerText = `UHF: ${c.uhf} | TF: ${c.tf} KHZ`;
        
        const modeTag = document.getElementById('mode-text');
        if(c.type === "A") {
            modeTag.innerText = "● ANALOG";
            modeTag.style.background = "#555";
            iptvVideo.className = ytFrame.className = "analog-bw";
            startNoSignal();
        } else {
            modeTag.innerText = "● DIGITAL";
            modeTag.style.background = "#ff0000";
            iptvVideo.className = ytFrame.className = "";
        }

        if(c.src === "yt") {
            iptvVideo.style.display = "none";
            iptvVideo.pause();
            ytFrame.style.display = "block";
            ytFrame.src = `https://www.youtube.com/embed/${c.id}?autoplay=1&controls=0&mute=0&rel=0`;
        } else {
            ytFrame.style.display = "none";
            ytFrame.src = "";
            iptvVideo.style.display = "block";
            if (Hls.isSupported()) {
                hls.loadSource(c.id);
                hls.attachMedia(iptvVideo);
                hls.on(Hls.Events.MANIFEST_PARSED, function() { iptvVideo.play(); });
            } else {
                iptvVideo.src = c.id;
            }
        }

        dash.classList.add('show');
        setTimeout(() => dash.classList.remove('show'), 5000);
    }

    function startNoSignal() {
        signalInterval = setInterval(() => {
            nosignal.style.display = "flex";
            iptvVideo.muted = true;
            setTimeout(() => { 
                nosignal.style.display = "none"; 
                iptvVideo.muted = false;
            }, 1500);
        }, 10000);
    }

    // --- WILAYAH SAKRAL PR/CH (V6) ---
    window.addEventListener('keydown', (e) => {
        if (!isStarted) return;
        if (e.key === "ArrowUp" || e.keyCode === 38 || e.keyCode === 427) {
            current = (current + 1) % channels.length;
            play(current);
        } else if (e.key === "ArrowDown" || e.keyCode === 40 || e.keyCode === 428) {
            current = (current - 1 + channels.length) % channels.length;
            play(current);
        }
    });
</script>
</body>
</html>
