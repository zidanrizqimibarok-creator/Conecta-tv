<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mionix Engine - Blue OS Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #007bff; --accent: #00d4ff; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        /* --- UI NAVIGASI PERMANEN --- */
        nav { 
            position: fixed; top: 0; width: 100%; height: 60px; 
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; border-bottom: 1px solid rgba(0, 212, 255, 0.3); z-index: 1000;
        }
        .nav-left { display: flex; align-items: center; gap: 20px; }
        #clock { font-family: monospace; font-size: 1.2rem; color: var(--accent); }

        /* --- MENU UTAMA (GRID ELEGANT) --- */
        #main-ui {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #001a33 0%, #000 70%);
            transition: opacity 0.8s ease;
        }
        .app-grid { display: grid; grid-template-columns: repeat(3, 200px); gap: 40px; }
        .app-tile {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 212, 255, 0.2);
            height: 200px; border-radius: 25px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; cursor: pointer; transition: 0.4s;
        }
        .app-tile:hover { 
            background: rgba(0, 212, 255, 0.1); border-color: var(--accent);
            transform: translateY(-10px); box-shadow: 0 10px 40px rgba(0, 212, 255, 0.3);
        }
        .app-tile i { font-size: 50px; margin-bottom: 15px; }

        /* --- SETTINGS MODAL (UPDATE & SMS CONTROL) --- */
        #settings-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; display: none;
            justify-content: center; align-items: center;
        }
        .settings-card {
            background: #0a0a0a; border: 1px solid var(--accent); padding: 40px;
            border-radius: 30px; width: 500px; text-align: center;
        }
        input, textarea {
            width: 100%; padding: 15px; margin: 10px 0; background: #111;
            border: 1px solid #333; color: white; border-radius: 10px; font-size: 1rem;
        }

        /* --- ANIMASI BOOTING BLUE OS --- */
        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: none;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .blue-loader { display: flex; gap: 10px; }
        .l-box { width: 15px; height: 40px; border: 2px solid var(--accent); border-radius: 5px; }
        .active { background: var(--accent); box-shadow: 0 0 20px var(--accent); }

        /* --- SMS WIDGET --- */
        #sms-widget {
            position: fixed; bottom: 30px; right: 30px; z-index: 1500;
        }
        #sms-popup {
            width: 300px; height: 200px; background: #0a0a0a; border: 1px solid var(--accent);
            border-radius: 15px; margin-bottom: 15px; display: none; padding: 15px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        #sms-trigger {
            width: 60px; height: 60px; background: var(--primary); border-radius: 50%;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
    </style>
</head>
<body onclick="document.documentElement.requestFullscreen()">

    <nav>
        <div class="nav-left">
            <button onclick="openSettings()" style="background:none; border:none; color:white; cursor:pointer; font-size:1.5rem;">⚙️</button>
            <span style="letter-spacing: 3px; font-weight: bold;">MIONIX <span style="color:var(--accent)">BLUE</span></span>
        </div>
        <div id="clock">00:00:00</div>
    </nav>

    <main id="main-ui">
        <div class="app-grid">
            <div class="app-tile" onclick="window.open('https://youtube.com/tv')"><i>📺</i><span>YouTube</span></div>
            <div class="app-tile" onclick="window.open('https://google.com')"><i>🔍</i><span>Google</span></div>
            <div class="app-tile" onclick="openSettings()"><i>🆙</i><span>Update</span></div>
        </div>
    </main>

    <div id="settings-overlay">
        <div class="settings-card">
            <h2 style="color:var(--accent)">SYSTEM CONTROL</h2>
            <div style="margin: 20px 0;">
                <p>KIRIM SMS KE TV</p>
                <textarea id="smsIn" placeholder="Tulis pesan..."></textarea>
                <button onclick="pushSMS()" style="width:100%; padding:10px; background:var(--primary); color:white; border:none; border-radius:5px; cursor:pointer;">KIRIM PESAN</button>
            </div>
            <hr style="border:0.5px solid #222; margin:20px 0;">
            <div style="margin: 20px 0;">
                <p>UPDATE SYSTEM CODE</p>
                <input type="text" id="upCode" placeholder="MASUKKAN KODE">
                <button onclick="startUpdate()" style="width:100%; padding:10px; background:var(--accent); color:black; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">BOOTING BLUE OS</button>
            </div>
            <button onclick="closeSettings()" style="margin-top:20px; color:#555; background:none; border:none; cursor:pointer;">BATAL</button>
        </div>
    </div>

    <div id="sms-widget">
        <div id="sms-popup" id="inbox">
            <strong style="color:var(--accent)">INBOX</strong>
            <div id="msgText" style="margin-top:10px; font-size:0.9rem; line-height:1.4;">Belum ada pesan...</div>
        </div>
        <div id="sms-trigger" onclick="toggleSMS()">💬</div>
    </div>

    <div id="boot-screen">
        <h1 style="letter-spacing:15px; margin-bottom:30px; color:var(--accent)">BLUE OS</h1>
        <div class="blue-loader" id="loader">
            <div class="l-box"></div><div class="l-box"></div><div class="box l-box"></div><div class="l-box"></div><div class="l-box"></div><div class="l-box"></div><div class="l-box"></div><div class="l-box"></div><div class="l-box"></div><div class="l-box"></div><div class="l-box"></div>
        </div>
        <div id="prog" style="margin-top:20px; font-size:2rem; font-weight:bold;">0%</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAJDcqRdRUHkU6tbrsQTs8ed0nE0c1yRso",
            authDomain: "zlxtore.firebaseapp.com",
            databaseURL: "https://zlxtore-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zlxtore",
            storageBucket: "zlxtore.firebasestorage.app",
            messagingSenderId: "875336983035",
            appId: "1:875336983035:web:54533953d5f6f24cce6b5e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function openSettings() { document.getElementById('settings-overlay').style.display = 'flex'; }
        function closeSettings() { document.getElementById('settings-overlay').style.display = 'none'; }
        function toggleSMS() { 
            const p = document.getElementById('sms-popup');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }

        // --- SMS REALTIME ---
        function pushSMS() {
            const txt = document.getElementById('smsIn').value;
            db.ref('broadcast/sms').set({ text: txt, time: new Date().toLocaleTimeString() });
            document.getElementById('smsIn').value = "";
            alert("Terkirim!");
        }

        db.ref('broadcast/sms').on('value', (s) => {
            if(s.exists()){
                document.getElementById('msgText').innerText = s.val().text;
                document.getElementById('sms-popup').style.display = 'block';
            }
        });

        // --- UPDATE & BOOTING BLUE OS ---
        function startUpdate() {
            const code = document.getElementById('upCode').value;
            db.ref('updates/' + code).once('value', (s) => {
                if(s.exists()){
                    closeSettings();
                    runBooting(s.val().newHtml);
                } else { alert("Kode Salah!"); }
            });
        }

        function runBooting(newCode) {
            const screen = document.getElementById('boot-screen');
            screen.style.display = 'flex';
            let p = 0;
            const boxes = document.querySelectorAll('.l-box');

            const timer = setInterval(() => {
                p++;
                document.getElementById('prog').innerText = p + "%";
                let idx = Math.floor(p / 9.1);
                if(boxes[idx]) boxes[idx].classList.add('active');

                if(p >= 100) {
                    clearInterval(timer);
                    setTimeout(() => {
                        document.open();
                        document.write(newCode);
                        document.close();
                    }, 1000);
                }
            }, 50);
        }

        setInterval(() => {
            const d = new Date();
            document.getElementById('clock').innerText = d.getHours().toString().padStart(2,'0')+":"+d.getMinutes().toString().padStart(2,'0')+":"+d.getSeconds().toString().padStart(2,'0');
        }, 1000);
    </script>
</body>
</html>
